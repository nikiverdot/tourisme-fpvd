<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
@media print {
  body:not(.is-admin) * { display: none !important; }
  body:not(.is-admin)::after { display: block !important; content: "Impression non autorisée."; font-size: 20px; text-align: center; padding: 40px; }
}
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; color: #1e293b; font-size: 15px; }
.app-wrapper { display: flex; flex-direction: column; height: 100vh; }

/* ── HEADER ── */
.app-header {
  background: white; border-bottom: 1px solid #e2e8f0;
  padding: 10px 16px; display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.app-logo { font-size: 15px; font-weight: 800; white-space: nowrap; color: #1e293b; }
.app-logo-img-wrap { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; }
.app-logo-img { height: 32px; width: auto; object-fit: contain; }
.auth-footer { position: relative; z-index: 1; color: #a8c8c4; font-size: 11px; text-align: center; padding: 12px 20px; letter-spacing: 0.03em; border-top: 1px solid rgba(196,149,106,0.4); display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; width: 100%; max-width: 700px; }
.auth-footer a { color: #c4956a; text-decoration: none; font-weight: 700; }
.auth-footer a:hover { text-decoration: underline; }
.auth-footer strong { color: white; }
.auth-footer span { color: #6a9e9e; }
.app-logo span { color: #0e5c5c; }
.boutique-tabs { display: flex; gap: 5px; }
.tab-btn { padding: 5px 13px; border-radius: 20px; border: 2px solid #e2e8f0; cursor: pointer; font-weight: 700; font-size: 13px; background: white; color: #64748b; transition: all 0.15s; white-space: nowrap; }
.tab-bulle   { border-color: #0e5c5c; background: #0e5c5c; color: white; }
.tab-delorme { border-color: #0891b2; background: #0891b2; color: white; }
.year-nav { display: flex; align-items: center; gap: 5px; margin-left: auto; }
.year-label { font-weight: 800; font-size: 14px; min-width: 46px; text-align: center; }
.nav-btn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid #e2e8f0; background: white; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: #64748b; }
.nav-btn:hover { background: #f1f5f9; }
.sync-badge { display: flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.sync-online  { background: #dcfce7; color: #15803d; }
.sync-offline { background: #f1f5f9; color: #94a3b8; }
.sync-saving  { background: #e0f2f0; color: #094848; }
.sync-error   { background: #fef2f2; color: #dc2626; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.sync-online .sync-dot { animation: pulse 2s infinite; }
.sync-saving .sync-dot { animation: pulse 0.7s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
.user-chip { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #64748b; cursor: pointer; padding: 3px 8px; border-radius: 20px; border: 1px solid #e2e8f0; }
.user-avatar { width: 20px; height: 20px; border-radius: 50%; background: #0e5c5c; color: white; font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center; }

/* ── TOOLBAR ── */
.toolbar {
  padding: 6px 16px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
  background: #f8fafc; border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.btn { padding: 5px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid transparent; white-space: nowrap; }
.btn:hover { opacity: 0.8; }
.btn-today  { background: #f0f8f7; color: #0e5c5c; border-color: #c4956a; }
.btn-ics    { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
.btn-export { background: #f0fdf4; color: #16a34a; border-color: #86efac; }
.btn-import { background: #eff6ff; color: #2563eb; border-color: #93c5fd; cursor: pointer; }
.ics-msg    { font-size: 11px; color: #64748b; }

/* ── TABLE WRAP ── */
.table-wrap {
  flex: 1;
  overflow: auto;
  min-height: 0;
}

/* ── TABLE ── */
/* border-collapse:separate é obrigatório para position:sticky funcionar no Chrome/Safari */
table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 800px; }
col.col-jour  { width: 34px; }
col.col-date  { width: 46px; }
col.col-rdv   { width: 200px; }
col.col-visite{ width: 320px; }
col.col-pax   { width: 42px; }
col.col-emp     { width: 68px; }
col.col-renfort { width: 80px; }

/* Sticky header — top:0 funciona porque table-wrap é o scroll container e border-collapse:separate */
thead th {
  position: sticky; top: 0; z-index: 200;
  background: #e2e8f0;
  border-top: 1px solid #cbd5e1;
  border-right: 1px solid #cbd5e1;
  border-bottom: 2px solid #94a3b8;
  padding: 7px 8px; font-size: 12px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.07em; color: #475569;
  text-align: center; white-space: nowrap;
}
thead th:first-child { border-left: 1px solid #cbd5e1; }
thead th.th-left { text-align: left; }

/* Month separator */
tr.month-sep td {
  background: #334155; color: #e2e8f0;
  font-size: 13px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.1em; padding: 6px 12px;
  border: none;
}

/* Day rows — border-right+bottom only (separate mode evita bordas duplas) */
tr.day-row td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
tr.day-row td:first-child { border-left: 1px solid #e2e8f0; }
/* hover ligne supprimé — aucune modification de couleur au survol */
tr.row-ferie td { background: #fef08a !important; }
tr.row-ferie .s-off { background: #fef08a !important; color: #a16207 !important; border-color: transparent !important; }
tr.row-today  td { background: #f0f8f7 !important; }
tr.row-sunday td { background: #fffbf5; }
tr.row-saturday td { background: #fffbf5; }
/* Séparateur de semaine : 3px sur la 1re ligne du lundi (3px > 2px → gagne toujours en border-collapse) */
tr.row-monday.day-first td { border-top: 3px solid #334155 !important; }
tr.row-alert td { background: #fff5f5 !important; }
.ferie-label { display: block; font-size: 10px; font-weight: 800; color: #a16207; text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.2; margin-top: 2px; word-break: break-word; white-space: normal; }
tr.row-ferme .ferie-label { color: #fde68a !important; }

/* ── JOURS FERMÉS — Caveau André Delorme ── */
tr.row-ferme td                { background: #64748b !important; border-color: #475569 !important; }
tr.row-ferme td.jour-cell      { color: #cbd5e1 !important; }
tr.row-ferme .date-num         { color: #f1f5f9 !important; }
tr.row-ferme .date-month       { color: #94a3b8 !important; }
tr.row-ferme .rdv-text         { color: #e2e8f0 !important; }
tr.row-ferme .rdv-add          { color: #475569 !important; }
tr.row-ferme .visite-empty     { color: #475569 !important; }
tr.row-ferme .add-visite-btn   { color: #94a3b8 !important; }
tr.row-ferme .visite-line      { color: #cbd5e1 !important; border-color: #475569 !important; }
tr.row-ferme .status-cell      { background: #475569 !important; color: #64748b !important; border-color: #4b5563 !important; pointer-events: none; }
tr.row-ferme .status-cell:hover{ transform: none !important; opacity: 1 !important; }
body.is-admin tr.row-ferme .status-cell { pointer-events: auto !important; opacity: 0.85; }
body.is-admin tr.row-ferme .status-cell:hover { transform: scale(1.05) !important; opacity: 1 !important; }

/* ── Mode lecture seule (viewer) — ZÉRO interaction ── */
body.is-viewer .status-cell    { pointer-events: none !important; cursor: default !important; }
body.is-viewer .status-cell:hover { transform: none !important; opacity: 1 !important; }
body.is-viewer .exc-toggle     { pointer-events: none !important; display: none !important; }
body.is-viewer .rdv-cell       { pointer-events: none !important; cursor: default !important; }
body.is-viewer .visite-cell    { pointer-events: none !important; cursor: default !important; }
body.is-viewer .add-visite-btn { display: none !important; }
body.is-viewer .rdv-add        { display: none !important; }
body.is-viewer .renfort-chip, body.is-viewer .renfort-empty { pointer-events: none !important; cursor: default !important; }
.viewer-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; background:#fef9c3; color:#854d0e; border:1px solid #fde68a; border-radius:12px; padding:2px 8px; white-space:nowrap; }
tr.row-ferme.row-sunday .status-cell.s-repos  { background: #ede9fe !important; color: #6d28d9 !important; border-color: #c4b5fd !important; }
tr.row-ferme.row-monday .status-cell.s-repos  { background: #ede9fe !important; color: #6d28d9 !important; border-color: #c4b5fd !important; }

/* Bouton d'exception */
.exc-toggle {
  display: block; margin-top: 3px; font-size: 9px; cursor: pointer;
  color: #94a3b8; text-align: center; line-height: 1.2;
  user-select: none;
}
.exc-toggle:hover { color: #475569; }
tr.row-ferme .exc-toggle { color: #94a3b8; }
tr.row-ferme .exc-toggle:hover { color: #f1f5f9; }
.exc-badge {
  display: inline-block; font-size: 8px; font-weight: 800;
  padding: 1px 5px; border-radius: 3px; margin-top: 2px;
  letter-spacing: 0.04em; white-space: nowrap;
}
.exc-ouvert { background: #dcfce7; color: #15803d; }
.exc-ferme  { background: #fee2e2; color: #dc2626; }

/* First row of a day group — top border stronger */
tr.day-first td { border-top: 2px solid #cbd5e1 !important; }
tr.day-first td:first-child { border-left: 1px solid #e2e8f0; }
tr.row-today.day-first td { border-top: 2px solid #0e5c5c !important; }
tr.row-alert.day-first td { border-top: 2px solid #ef4444 !important; }

/* JOUR cell */
td.jour-cell {
  text-align: center; padding: 4px 2px; vertical-align: middle !important;
  font-size: 13px; font-weight: 700; text-transform: uppercase;
  color: #94a3b8; letter-spacing: 0.04em;
}
tr.row-sunday  td.jour-cell { color: #f97316; }
tr.row-saturday td.jour-cell { color: #f97316; }
tr.row-today   td.jour-cell { color: #0e5c5c; }

/* DATE cell */
td.date-cell {
  text-align: center; padding: 2px 3px; vertical-align: middle !important;
}
.date-num   { display: block; font-size: 19px; font-weight: 800; color: #1e293b; line-height: 1; }
.date-month { display: block; font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.04em; }
tr.row-today .date-num  { color: #0e5c5c; }
tr.row-sunday .date-num { color: #f97316; }
tr.row-alert .date-num  { color: #dc2626; }

/* RDV / notes cell */
td.rdv-cell {
  padding: 5px 8px; vertical-align: middle !important;
  cursor: pointer; min-width: 0;
}
td.rdv-cell:hover { background: rgba(124,58,237,0.04) !important; }
.rdv-text { font-size: 13px; color: #374151; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
.rdv-add  { font-size: 12px; color: #c4956a; }
td.rdv-cell.has-note .rdv-add { display: none; }

/* VISITE cell */
td.visite-cell { padding: 3px 8px; vertical-align: middle !important; }
.visite-line {
  font-size: 13px; color: #1e293b; padding: 2px 0;
  border-bottom: 1px solid #f1f5f9; white-space: normal;
  word-break: break-word; overflow-wrap: break-word;
}
.visite-line:last-of-type { border-bottom: none; }
.visite-line strong { color: #0f172a; font-weight: 900; }
.visite-badge { font-size: 11px; font-weight: 700; padding: 1px 5px; border-radius: 4px; white-space: nowrap; }
.badge-option  { background: #fef9c3; color: #92400e; border: 1px solid #fcd34d; font-weight: 800; }
.badge-aregler { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; font-weight: 800; }
.visite-empty { font-size: 13px; color: #cbd5e1; padding: 2px 0; }
.add-visite-btn { display: inline-flex; align-items: center; gap: 3px; font-size: 12px; color: #4a9e9e; cursor: pointer; padding: 2px 6px; border-radius: 4px; margin-top: 1px; }
.add-visite-btn:hover { background: #f0f8f7; }

/* CHECK-IN badges */
.visite-line.ck-arrived { background:#f0fdf4; border-left:3px solid #16a34a; padding-left:5px; border-radius:3px; }
.visite-line.ck-noshow  { background:#fef2f2; border-left:3px solid #dc2626; padding-left:5px; border-radius:3px; text-decoration:line-through; color:#dc2626 !important; }
.visite-line.ck-noshow strong { color:#dc2626 !important; }
/* multi-item per-part wrapper */
.visite-item { display:inline; white-space:nowrap; }
.visite-item.ck-arrived { color:#15803d; font-weight:600; }
.visite-item.ck-noshow  { color:#dc2626; text-decoration:line-through; opacity:.85; }
.ck-btn {
  display:inline-flex; align-items:center; justify-content:center;
  width:15px; height:15px; border-radius:50%; cursor:pointer;
  border:1.5px solid #cbd5e1; background:white; font-size:9px;
  margin-left:4px; vertical-align:middle; flex-shrink:0;
  text-decoration:none !important;
  transition: background .15s, border-color .15s;
}
.ck-btn:hover { border-color:#64748b; }
.ck-btn.ck-arrived { background:#16a34a; border-color:#16a34a; color:white; }
.ck-btn.ck-noshow  { background:#dc2626; border-color:#dc2626; color:white; }

/* PAX cell */
td.pax-cell {
  text-align: center; padding: 4px 4px; vertical-align: middle !important;
  font-size: 15px; font-weight: 800;
  border-right: 3px solid #94a3b8 !important;
}
.pax-big { color: #dc2626; }

/* EMPLOYEE cell */
td.emp-cell { padding: 3px 3px; text-align: center; vertical-align: middle !important; background: #f8faff; }
td.emp-cell-locked .status-cell { cursor: default !important; opacity: 0.85; }
td.emp-cell-locked .status-cell:hover { transform: none !important; }
td.emp-cell:first-of-type,
td[data-col="emp-0"] { border-left: 3px solid #94a3b8 !important; }
thead th.th-emp:first-of-type,
thead th[data-col="emp-0"] { border-left: 3px solid #94a3b8 !important; }
.status-cell {
  border-radius: 6px; cursor: pointer; text-align: center;
  font-size: 12px; font-weight: 800; min-height: 36px; height: auto;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 2px solid transparent; transition: transform 0.1s;
  user-select: none; letter-spacing: 0.03em; width: 100%;
  padding: 3px 2px; gap: 1px;
}
.status-note {
  font-size: 9px; font-weight: 600; opacity: 0.8; letter-spacing: 0.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
}
.status-cell:hover { transform: scale(1.04); opacity: 0.85; }
/* Demi-journée (matin / après-midi) */
.status-half {
  flex: 1; display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
  font-size: 10px; font-weight: 800; letter-spacing: 0.03em; gap: 2px;
  min-height: 17px; width: 100%;
}
.status-third {
  flex: 1; display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
  font-size: 9px; font-weight: 800; letter-spacing: 0.03em; gap: 2px;
  min-height: 11px; width: 100%;
}
.half-tag { font-size: 7px; opacity: 0.65; font-weight: 600; }
/* Boutons période dans la modale */
.period-btn {
  flex: 1; padding: 6px 4px; border-radius: 6px; border: 1.5px solid #e2e8f0;
  background: white; font-size: 11px; font-weight: 600; color: #64748b;
  cursor: pointer; text-align: center; transition: all 0.1s; user-select: none;
}
.period-btn:hover { background: #f8fafc; }
.period-btn.selected { border-color: #0e5c5c; background: #f0f8f7; color: #0e5c5c; }

/* Status colors */
.s-va       { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; }
.s-ad       { background: #fef9c3; color: #a16207; border-color: #fcd34d; }
.s-csa      { background: #e8d4b0; color: #5c2800; border-color: #c49a50; }
.s-jf       { background: #f1f5f9; color: #94a3b8; border-color: #e2e8f0; }
.s-repos    { background: #ede9fe; color: #6d28d9; border-color: #c4b5fd; }
.s-conges   { background: #dcfce7; color: #15803d; border-color: #86efac; }
.s-formation{ background: #fce7f3; color: #9d174d; border-color: #f9a8d4; }
.s-maladie  { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
.s-off      { background: #fef08a; color: #a16207; border-color: #fcd34d; }
.s-off:hover { background: #fde047; color: #92400e; }
.cell-alert { outline: 2px solid #ef4444; outline-offset: 1px; border-radius: 5px; }

/* RENFORT cells */
td.renfort-cell {
  padding: 3px 4px; text-align: center; vertical-align: middle !important;
}
.renfort-chip {
  display: inline-flex; align-items: center; gap: 3px;
  background: #fef9c3; color: #78350f; border: 1px solid #fcd34d;
  border-radius: 5px; padding: 2px 6px; font-size: 12px; font-weight: 700;
  cursor: pointer; white-space: nowrap; max-width: 100%; overflow: hidden;
  text-overflow: ellipsis;
}
.renfort-chip:hover { background: #fef08a; }
.renfort-empty {
  font-size: 12px; color: #cbd5e1; cursor: pointer; padding: 2px 4px;
  display: block; text-align: center;
}
.renfort-empty:hover { color: #94a3b8; }
tr.row-ferme .renfort-empty { color: #475569 !important; }
tr.row-ferme .renfort-chip  { opacity: 0.5; pointer-events: none; }

/* Thead rename hint */
thead th.th-emp { cursor: pointer; background: #f0f4ff; }
thead th.th-emp:hover { background: #d1d5db; }
thead th.th-emp::after { content: ' ✎'; font-size: 8px; opacity: 0.4; }
thead th[data-col="pax"] { border-right: 3px solid #94a3b8 !important; }
thead th.th-renfort { background: #fef9c3 !important; color: #92400e !important; border-color: #fcd34d !important; }

/* LEGEND */
.legend { display: flex; gap: 10px; padding: 8px 16px; flex-wrap: wrap; background: white; border-top: 1px solid #e2e8f0; font-size: 13px; flex-shrink: 0; }
.leg-item { display: flex; align-items: center; gap: 4px; color: #475569; }
.leg-dot  { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; border: 2px solid transparent; }

/* ── COLUMN MANAGER ── */
.col-panel {
  position: absolute; top: calc(100% + 4px); right: 0; z-index: 400;
  background: white; border: 1px solid #e2e8f0; border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12); padding: 10px 0; min-width: 200px;
}
.col-panel-wrap { position: relative; }
.col-panel-title { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;
  letter-spacing: 0.07em; padding: 0 14px 6px; border-bottom: 1px solid #f1f5f9; margin-bottom: 4px; }
.col-item { display: flex; align-items: center; gap: 8px; padding: 5px 14px; cursor: pointer; font-size: 12px; }
.col-item:hover { background: #f8fafc; }
.col-item input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; accent-color: #0e5c5c; }
.col-item label { cursor: pointer; flex: 1; user-select: none; }
.col-sep { border: none; border-top: 1px solid #f1f5f9; margin: 4px 0; }

/* Resize handle on th */
thead th { position: sticky; top: 0; z-index: 200; }
.th-inner { display: flex; align-items: center; gap: 3px; position: relative; }
.resize-handle {
  position: absolute; right: -4px; top: 0; bottom: 0; width: 8px;
  cursor: col-resize; z-index: 10;
}
.resize-handle:hover::after, .resize-handle.resizing::after {
  content: ''; position: absolute; left: 3px; top: 20%; bottom: 20%;
  width: 2px; background: #0e5c5c; border-radius: 2px;
}

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(2px); }
.modal { background: white; border-radius: 14px; padding: 20px; width: 400px; max-width: 94vw; box-shadow: 0 24px 64px rgba(0,0,0,0.18); max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.modal-title  { font-size: 14px; font-weight: 800; color: #0f172a; }
.modal-close  { width: 26px; height: 26px; border-radius: 7px; border: 1px solid #e2e8f0; background: #f8fafc; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; color: #64748b; }
.modal-close:hover { background: #f1f5f9; }
.form-group   { margin-bottom: 11px; }
.form-label   { font-size: 10px; font-weight: 700; color: #64748b; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 7px 9px; border: 1.5px solid #e2e8f0; border-radius: 7px; font-size: 13px; background: #f8fafc; color: #1e293b; font-family: inherit; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #0e5c5c; background: white; }
.form-textarea { resize: vertical; min-height: 70px; }
.status-picker { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
.status-option { padding: 7px 4px; border-radius: 7px; border: 2px solid transparent; cursor: pointer; text-align: center; font-size: 11px; font-weight: 700; }
.status-option.selected { border-color: #1e293b !important; }
.so-va       { background: #dbeafe; color: #1d4ed8; }
.so-ad       { background: #fef9c3; color: #a16207; }
.so-csa      { background: #e8d4b0; color: #5c2800; }
.so-jf       { background: #f1f5f9; color: #94a3b8; }
.so-repos    { background: #ede9fe; color: #6d28d9; border: 1px solid #c4b5fd; }
.so-conges   { background: #dcfce7; color: #15803d; }
.so-formation{ background: #fce7f3; color: #9d174d; }
.so-maladie  { background: #fee2e2; color: #991b1b; }
.so-off      { background: #fef08a; color: #a16207; }
.modal-actions { display: flex; gap: 7px; justify-content: flex-end; margin-top: 14px; padding-top: 12px; border-top: 1px solid #f1f5f9; }
.btn-mp  { padding: 7px 16px; background: #0e5c5c; color: white; border-radius: 7px; font-weight: 700; cursor: pointer; border: none; font-size: 12px; }
.btn-ms  { padding: 7px 12px; background: #f1f5f9; color: #374151; border-radius: 7px; font-weight: 600; cursor: pointer; border: 1px solid #e2e8f0; font-size: 12px; }
.btn-md  { padding: 7px 12px; background: #fef2f2; color: #dc2626; border-radius: 7px; font-weight: 600; cursor: pointer; border: 1px solid #fca5a5; font-size: 12px; }
.btn-mfh { padding: 7px 12px; background: #fff7ed; color: #c2410c; border-radius: 7px; font-weight: 600; cursor: pointer; border: 1px solid #fed7aa; font-size: 12px; }
.fh-note { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 7px; padding: 8px 10px; font-size: 11px; color: #92400e; margin-bottom: 10px; }

/* ── Modal périodes 3-sections ── */
.period-section { background:#f8fafc; border:1.5px solid #e2e8f0; border-radius:8px; padding:8px 10px; margin-bottom:7px; }
.period-section-hd { font-size:12px; font-weight:700; color:#334155; margin-bottom:6px; display:flex; align-items:center; justify-content:space-between; }
.period-section-clear { font-size:10px; color:#dc2626; cursor:pointer; background:#fef2f2; border:1px solid #fca5a5; border-radius:4px; padding:1px 7px; line-height:1.6; }
.status-picker-mini { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:5px; }
.status-picker-mini .status-option { font-size:10px !important; padding:3px 7px !important; border-radius:5px; cursor:pointer; font-weight:700; }
.status-note-sm { font-size:9px; font-style:italic; color:#334155; display:block; flex-basis:100%; text-align:center; margin-top:0; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; opacity:.85; line-height:1.2; }
.period-full-bar { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:10px; padding:6px 8px; background:#fffbf0; border:1.5px dashed #f59e0b; border-radius:8px; }
/* ── Colonnes figées : DATE · NOTES · VISITES ── */
:root { --freeze-jour:0px; --freeze-date:34px; --freeze-rdv:80px; --freeze-visite:280px; }
td.jour-cell, td.date-cell, td.rdv-cell, td.visite-cell { position:sticky; z-index:4; }
td.jour-cell   { left:var(--freeze-jour);   background:#fff; }
td.date-cell   { left:var(--freeze-date);   background:#fff; }
td.rdv-cell    { left:var(--freeze-rdv);    background:#fff; }
td.visite-cell { left:var(--freeze-visite); background:#fff; box-shadow:3px 0 6px -1px rgba(0,0,0,.1); }
thead th[data-col="date"]   { left:var(--freeze-jour);   z-index:210; }
thead th[data-col="rdv"]    { left:var(--freeze-rdv);    z-index:210; }
thead th[data-col="visite"] { left:var(--freeze-visite); z-index:210; box-shadow:3px 0 6px -1px rgba(0,0,0,.1); }
/* Backgrounds par état de ligne (doivent couvrir la couleur de fond de la ligne) */
tr.row-ferie    td.jour-cell,tr.row-ferie    td.date-cell,tr.row-ferie    td.rdv-cell,tr.row-ferie    td.visite-cell { background:#fef08a !important; }

tr.row-saturday td.jour-cell,tr.row-saturday td.date-cell,tr.row-saturday td.rdv-cell,tr.row-saturday td.visite-cell { background:#fffbf5; }
tr.row-alert    td.jour-cell,tr.row-alert    td.date-cell,tr.row-alert    td.rdv-cell,tr.row-alert    td.visite-cell { background:#fff5f5 !important; }
tr.row-ferme    td.jour-cell,tr.row-ferme    td.date-cell,tr.row-ferme    td.rdv-cell,tr.row-ferme    td.visite-cell { background:#64748b !important; }
/* hover colonnes figées supprimé */
/* ── Badges contrat dans l'en-tête employé ── */
.contract-badge { display:block; font-size:7px; font-weight:700; padding:1px 4px; border-radius:3px; margin-top:2px; line-height:1.4; text-align:center; }
.contract-alt   { background:#ede9fe; color:#6d28d9; border:1px solid #c4b5fd; }
.contract-cdd   { background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }
.contract-cdi   { background:#dcfce7; color:#15803d; border:1px solid #86efac; }

.emp-cell-out { background: repeating-linear-gradient(135deg,#f1f5f9 0px,#f1f5f9 4px,#e2e8f0 4px,#e2e8f0 8px) !important; cursor: default !important; pointer-events: none !important; opacity: .45; }
/* ── AUTH OVERLAY ── */

}
.auth-logo-img { height: 90px; width: auto; position: relative; z-index: 1; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4)); }

  background: rgba(255,255,255,0.97); border-radius: 16px; padding: 32px 32px 28px;

.auth-tab.active { background: #0e5c5c; color: white; border-color: #0e5c5c; }
.auth-input { width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 9px;

/* ── PRESENCE BAR ── */
.presence-bar  { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }

.activity-dot { position: absolute; top: 2px; right: 2px; width: 14px; height: 14px;

  display: flex; align-items: center; justify-content: center;

/* ── CONSECUTIVE WORK DAYS ── */

.cell-warn-7 { outline: 2px solid #dc2626 !important; outline-offset: 1px; border-radius: 5px;

   RESPONSIVE — Tablette & Mobile
   Le tableau conserve son scroll horizontal natif.
   Le pinch-to-zoom du navigateur fonctionne librement.
   ═══════════════════════════════════════════════════════ */

/* ── Tablette (≤ 960px) ── */
@media (max-width: 960px) {

/* ── Mobile (≤ 600px) ── */
@media (max-width: 600px) {
  body { font-size: 13px; }

  /* Header : logo + contrôles sur 1re ligne, onglets sur 2e ligne */
  .app-header  { padding: 6px 10px; gap: 5px; }
  .app-logo    { font-size: 11px; flex-shrink: 0; }
  .boutique-tabs { order: 20; width: 100%; }

  .year-label  { font-size: 12px; min-width: 36px; }
  .nav-btn     { width: 22px; height: 22px; font-size: 12px; }

  /* Masqués sur mobile */
  #presence-bar  { display: none !important; }
  #btn-export, #btn-import-json { display: none !important; }
  #sync-label  { display: none; }

  /* Colonnes : bouton visible sur mobile (ouvre une modale) */
  .col-panel-wrap { display: block !important; flex-shrink: 0; }
  /* Le dropdown ne s'ouvre pas sur mobile (géré via modale JS) */
  .col-panel-wrap .col-panel { display: none !important; }

  /* Désactiver le gel horizontal des colonnes sur mobile */
  td.jour-cell, td.date-cell, td.rdv-cell, td.visite-cell {
    position: static !important;
    left: unset !important;
    box-shadow: none !important;
  }
  thead th[data-col="date"],
  thead th[data-col="rdv"],
  thead th[data-col="visite"] { left: unset !important; }

  /* Bouton admin et import CSV : compacts sur mobile */
  #btn-admin, #btn-csv-import { padding: 5px 9px; font-size: 11px; }


  /* Chip utilisateur : avatar seul */
  #user-name-label, .user-chip > span:last-child { display: none !important; }

  /* Bouton déconnexion minuscule */
  button[onclick="logoutUser()"] { padding: 3px 7px; font-size: 10px; }

  .toolbar     { padding: 5px 8px; gap: 5px; flex-wrap: nowrap; overflow-x: auto;
                 -webkit-overflow-scrolling: touch; }
  .btn         { padding: 6px 10px; font-size: 11px; flex-shrink: 0; }
  .ics-msg     { display: none; }

  /* Table : colonnes réduites, scroll horizontal */
  table          { min-width: 420px; }
  col.col-jour   { width: 26px; }
  col.col-date   { width: 36px; }
  col.col-rdv    { width: 90px; }

  td.rdv-cell  { padding: 2px 4px; }

  /* Modal → feuille du bas (bottom sheet) */
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal         { width: 100vw; max-width: 100vw; border-radius: 20px 20px 0 0;
                   margin: 0; padding: 18px 14px 30px; max-height: 88vh; }

  /* Status picker 2 colonnes sur mobile */

  /* Boutons période plus grands (touch) */

  /* Formulaires dans la modal */
  .form-input, .form-select, .form-textarea { font-size: 14px; padding: 9px 10px; }
  .btn-mp, .btn-ms, .btn-md { padding: 9px 14px; font-size: 13px; }
}

// ═══ CONSTANTS ════════════════════════════════

// ═══ STATE ════════════════════════════════════
let state = {

const MONIQUE_EMAILS    = ['mfverdot@gmail.com', 'verdotmf@gmail.com', 'monique.verdot@fpvd.fr', 'verdotmonique@gmail.com'];
// Comptes admin qui court-circuitent l'ACL (verdotmonique passe par l'ACL Firebase)
const ADMIN_EMAILS      = ['mfverdot@gmail.com', 'verdotmf@gmail.com'];

const isMonique = (email) => MONIQUE_EMAILS.includes((email||'').toLowerCase());
// Clé publique VAPID — remplacer par la vraie clé après génération
const VAPID_PUBLIC_KEY  = 'BLVOFQuubXbAZWnYeLgBNam55ifATR_3igEBmf9E5XqDiJ3emTzJmCn9Y5FT-pck6dcQpqg2z_X_G55rSyY6uK8';
const PUSH_SECRET       = 'fpvd-push-planning'; // même valeur que dans Netlify env
const MANAGER_BULLE     = 'tourisme@fpvd.fr';      // gère tout Bulle sauf Monique
const MANAGER_DELORME   = 'caveau@andre-delorme.com'; // gère Julie + Renfort + CDD (AD)

// ── Permissions ──────────────────────────────────────────────────────────────
// Logique manager : boutiqueGérée + règles par boutique (Monique = admin uniquement)
function _managerCanEdit(boutiqueGérée, b, empName) {
  if (b !== boutiqueGérée) return false;                     // autre boutique → non
  if (empName === 'Monique') return false;                   // Monique → admin seulement
  if (boutiqueGérée === 'delorme') {
    return empName === 'Julie'                               // Julie
        || empName.toLowerCase().includes('cdd')            // CDD
        || empName.toLowerCase().includes('renfort');        // Renfort
  }
  return true; // Bulle : tout sauf Monique (déjà exclu ci-dessus)
}

// Renvoie true si l'utilisateur connecté peut modifier la cellule d'un employé
function canEditEmployee(b, empName) {
  if (!authUser) return false;
  if (currentUserRole === 'viewer') return false;            // viewer → lecture seule
  const email = authUser.email.toLowerCase();
  // Colonne Monique : réservée exclusivement à ses propres comptes
  if (empName === 'Monique') return isMonique(email);
  if (isAdmin(email)) return true;                           // admin → tout le reste
  // Managers hardcodés (compatibilité) + rôle ACL 'manager'
  const mgBoutique = email === MANAGER_BULLE    ? 'bulle'
                   : email === MANAGER_DELORME  ? 'delorme'
                   : currentUserRole === 'manager' ? currentUserBoutique
                   : null;
  if (mgBoutique) return _managerCanEdit(mgBoutique, b, empName);
  // Employé : uniquement sa propre colonne
  const myName = (authUser.displayName || '').trim().toLowerCase();
  return myName !== '' && empName.trim().toLowerCase() === myName;
}

function canEditRenfort(b) {
  if (!authUser) return false;
  if (currentUserRole === 'viewer') return false;            // viewer → lecture seule
  const email = authUser.email.toLowerCase();
  if (isAdmin(email))            return true;
  const mgBoutique = email === MANAGER_BULLE    ? 'bulle'
                   : email === MANAGER_DELORME  ? 'delorme'
                   : currentUserRole === 'manager' ? currentUserBoutique
                   : null;
  if (mgBoutique) return b === mgBoutique;
  return false; // autres utilisateurs ne peuvent pas modifier les renforts
}

// ═══ AUTH UI ══════════════════════════════════
function switchAuthTab(tab) {
  authTab = tab;
  document.querySelectorAll('.auth-tab').forEach((el,i) => el.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('auth-name-row').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-submit-btn').textContent = tab === 'login' ? 'Connexion' : 'Créer mon compte';
  clearAuthMsg();
}
function showAuthErr(msg)  { const el=document.getElementById('auth-msg-err'); el.textContent=msg; el.className='auth-msg auth-error show'; document.getElementById('auth-msg-ok').className='auth-msg auth-success'; }
function showAuthOk(msg)   { const el=document.getElementById('auth-msg-ok');  el.textContent=msg; el.className='auth-msg auth-success show'; document.getElementById('auth-msg-err').className='auth-msg auth-error'; }
function clearAuthMsg()    { document.getElementById('auth-msg-err').className='auth-msg auth-error'; document.getElementById('auth-msg-ok').className='auth-msg auth-success'; }

async function authSubmit() {
  const email = (document.getElementById('auth-email').value||'').trim().toLowerCase();
  const pass  = (document.getElementById('auth-pass').value||'').trim();
  if (!email || !pass) return showAuthErr('Entrez votre email et mot de passe.');
  document.getElementById('auth-submit-btn').disabled = true;
  try {
    if (authTab === 'login') {
      await firebase.auth().signInWithEmailAndPassword(email, pass);
    } else {
      const name = (document.getElementById('auth-name').value||'').trim();
      if (!name) { document.getElementById('auth-submit-btn').disabled=false; return showAuthErr('Entrez votre prénom.'); }
      if (pass.length < 6) { document.getElementById('auth-submit-btn').disabled=false; return showAuthErr('Mot de passe trop court (min. 6 caractères).'); }
      // Créer le compte d'abord, puis vérifier l'ACL une fois authentifié
      const isAdminUser = isAdmin(email);
      const cred = await firebase.auth().createUserWithEmailAndPassword(email, pass);
      if (!isAdminUser) {
        const snap = await db.ref(ACL_PATH + '/' + emailKey(email)).once('value');
        if (!snap.exists()) {
          // Email non autorisé → supprimer le compte et déconnecter
          await cred.user.delete();
          await firebase.auth().signOut();
          document.getElementById('auth-submit-btn').disabled = false;
          return showAuthErr("Votre email n'est pas autorisé. Contactez mfverdot@gmail.com.");
        }
      }
      await cred.user.updateProfile({ displayName: name });
    }
  } catch(e) {
    document.getElementById('auth-submit-btn').disabled = false;
    const msgs = {
      'auth/user-not-found':    "Compte introuvable. Si c'est votre première visite, cliquez sur « Premier accès ».",
      'auth/wrong-password':    "Mot de passe incorrect.",
      'auth/invalid-credential':"Email ou mot de passe incorrect. Si c'est votre première visite, cliquez sur « Premier accès ».",
      'auth/email-already-in-use': "Ce compte existe déjà. Utilisez « Connexion ».",
      'auth/invalid-email':     "Adresse email invalide."
    };
    showAuthErr(msgs[e.code] || ('Erreur : ' + e.message));
  }
}

async function doReset() {
  const email = (document.getElementById('auth-email').value||'').trim();
  if (!email) return showAuthErr('Entrez votre email pour réinitialiser le mot de passe.');
  try {
    await firebase.auth().sendPasswordResetEmail(email);
    showAuthOk('Email de réinitialisation envoyé à ' + email + '. Vérifiez vos spams.\n⚠ Cela ne fonctionne que si vous avez déjà créé votre compte via « Premier accès ».');
  } catch(e) {
    if (e.code === 'auth/user-not-found') {
      showAuthErr("Aucun compte trouvé pour cet email. Utilisez d'abord « Premier accès » pour créer votre compte.");
    } else {
      showAuthErr('Erreur : ' + e.message);
    }
  }
}

function emailKey(email) { return email.toLowerCase().replace(/\./g,'_dot_').replace(/@/g,'_at_'); }

// ═══ FIREBASE CORE ════════════════════════════
function initFirebaseCore() {
  if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') return false;
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    isFirebase = true;
    return true;
  } catch(e) { console.error('Firebase init error', e); return false; }
}

function initFirebaseData() {
  setSyncBadge('saving','Connexion…');
  db.ref(DB_PATH).on('value', snap => {
    if (pendingSave) return; // Ne pas écraser les modifications locales en cours de sauvegarde
    const data = snap.val();
    if (data && data.boutiques) {
      Object.keys(data.boutiques).forEach(b => {
        if (state.boutiques[b]) {
          state.boutiques[b].schedule     = data.boutiques[b].schedule     || {};
          state.boutiques[b].bookings     = data.boutiques[b].bookings     || {};
          state.boutiques[b].notes        = data.boutiques[b].notes        || {};
          state.boutiques[b].exceptions   = data.boutiques[b].exceptions   || {};
          state.boutiques[b].renforts     = data.boutiques[b].renforts     || {};
          state.boutiques[b].statusNotes    = data.boutiques[b].statusNotes    || {};
          state.boutiques[b].statusNotesAM  = data.boutiques[b].statusNotesAM  || {};
          state.boutiques[b].statusNotesPM  = data.boutiques[b].statusNotesPM  || {};
          state.boutiques[b].statusNotesSoir= data.boutiques[b].statusNotesSoir|| {};
          state.boutiques[b].schedulePM     = data.boutiques[b].schedulePM     || {};
          state.boutiques[b].renfortLabels  = data.boutiques[b].renfortLabels  || ['Renfort 1','Renfort 2'];
          if (data.boutiques[b].employees && data.boutiques[b].employees.length)
            state.boutiques[b].employees = data.boutiques[b].employees;
        }
      });
      patchEmployees();
      render();
      if (firstDataLoad) { firstDataLoad = false; setTimeout(scrollToToday, 150); }
    }
    setSyncBadge('online', '● En ligne');
  }, () => setSyncBadge('error','Erreur sync'));

  // Check-in temps réel
  db.ref('piffaut-checkin').on('value', snap => {
    checkinData = snap.val() || {};
    render();
  });

  // Connexion temps réel Firebase
  db.ref('.info/connected').on('value', snap => {
    if (snap.val() === true) {
      setSyncBadge('online', '● En ligne');
    } else {
      setSyncBadge('offline', 'Hors ligne');
    }
  });
}

// ═══ SAVE (FIABLE) ════════════════════════════
function buildPayload() {
  const payload = { lastUpdated: Date.now(), lastUpdatedBy: currentUser||'Anonyme', boutiques: {} };
  Object.keys(state.boutiques).forEach(b => {
    payload.boutiques[b] = {
      schedule:     state.boutiques[b].schedule     || {},
      bookings:     state.boutiques[b].bookings     || {},
      notes:        state.boutiques[b].notes        || {},
      exceptions:   state.boutiques[b].exceptions   || {},
      renforts:     state.boutiques[b].renforts     || {},
      statusNotes:     state.boutiques[b].statusNotes     || {},
      statusNotesAM:   state.boutiques[b].statusNotesAM   || {},
      statusNotesPM:   state.boutiques[b].statusNotesPM   || {},
      statusNotesSoir: state.boutiques[b].statusNotesSoir || {},
      schedulePM:      state.boutiques[b].schedulePM      || {},
      renfortLabels:   state.boutiques[b].renfortLabels   || ['Renfort 1','Renfort 2'],
      employees:    state.boutiques[b].employees    || []
    };
  });
  return payload;
}

function doSaveNow() {
  if (!db || !authUser) return; // never write without auth
  pendingSave = true;
  setSyncBadge('saving','Sauvegarde…');
  db.ref(DB_PATH).set(buildPayload())
    .then(() => { pendingSave = false; setSyncBadge('online','✓ Sauvegardé · ' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})); })
    .catch(err => {
      pendingSave = false;
      setSyncBadge('error','Erreur save');
      // Retry once after 2s
      setTimeout(() => { if (isFirebase && db) db.ref(DB_PATH).set(buildPayload()).catch(()=>{}); }, 2000);
    });
}

function scheduleSave() {
  if (!isFirebase) return;
  pendingSave = true;
  clearTimeout(saveTimer);
  setSyncBadge('saving','…');
  saveTimer = setTimeout(doSaveNow, 500);
}

function patchEmployees() {
  // Bulle : Monique après Alice
  const bulleEmps = state.boutiques.bulle.employees;
  if (!bulleEmps.includes('Monique')) {
    const idx = bulleEmps.indexOf('Alice');
    idx >= 0 ? bulleEmps.splice(idx + 1, 0, 'Monique') : bulleEmps.push('Monique');
    scheduleSave();
  }
  // Delorme : Monique après Julie
  const delormeEmps = state.boutiques.delorme.employees;
  if (!delormeEmps.includes('Monique')) {
    const idx = delormeEmps.indexOf('Julie');
    idx >= 0 ? delormeEmps.splice(idx + 1, 0, 'Monique') : delormeEmps.splice(1, 0, 'Monique');
    scheduleSave();
  }
}

// Sauvegarde immédiate quand l'onglet est masqué ou fermé
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && pendingSave) {
    clearTimeout(saveTimer);
    doSaveNow();
  }
});
window.addEventListener('beforeunload', e => {
  if (pendingSave) { clearTimeout(saveTimer); doSaveNow(); }
});

function setSyncBadge(t, l) {
  const el = document.getElementById('sync-badge'); if (!el) return;
  el.className = 'sync-badge sync-' + t;
  document.getElementById('sync-label').textContent = l;
}
function relTime(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return "à l'instant";
  if (d < 3600000) return 'il y a ' + Math.floor(d/60000) + 'min';
  return 'il y a ' + Math.floor(d/3600000) + 'h';
}

// ═══ PRESENCE (QUI EST CONNECTÉ) ══════════════
const PRES_COLORS = ['#0e5c5c','#0891b2','#dc2626','#16a34a','#d97706','#db2777','#0284c7','#059669','#b45309'];
function userColor(uid) { let h=0; for(let i=0;i<uid.length;i++) h=(h*31+uid.charCodeAt(i))&0xffff; return PRES_COLORS[Math.abs(h)%PRES_COLORS.length]; }

let presenceData = {};

function initPresence(user) {
  const pRef = db.ref(PRES_PATH + '/' + user.uid);
  const name = currentUser || user.email.split('@')[0];
  // Monique est invisible : elle ne publie pas sa présence (les autres ne la voient pas)
  if (!isMonique(user.email)) {
    pRef.set({ name, email: user.email, color: userColor(user.uid), since: Date.now() });
    pRef.onDisconnect().remove();
  }
  db.ref(PRES_PATH).on('value', snap => {
    presenceData = snap.val() || {};
    updatePresenceBar();
    updateActivityDots();
  });
}

function updatePresenceBar() {
  const bar = document.getElementById('presence-bar');
  if (!bar) return;
  bar.innerHTML = Object.entries(presenceData).map(([uid, u]) => {
    // Ne jamais afficher Monique dans la barre de présence
    if (isMonique(u.email)) return '';
    const isMe    = authUser && uid === authUser.uid;
    const initials = (u.name||'?').substring(0,2).toUpperCase();
    const editing  = u.editing;

// ═══ CONTRATS & CONGÉS PAYÉS ═════════════════
const WORK_STATUSES = new Set(['va','ad','formation']);
const CP_TOTAL = 25; // fallback employés permanents

// Configuration par employé : périodes de contrat avec quotas CP+RÉVISION
const CP_CONFIG = {
  'Alice': [
    // Alternance : sep 2025 → août 2026 · 25 CP + 5 jours de révision
    { from:'2025-09-01', to:'2026-08-31', cpTotal:25, revTotal:5, label:'Alternance' },
    // CDD : 1 sept → 31 déc 2026 · CP repart de 0 (2.5j/mois × 4 mois = 10j)
    { from:'2026-09-01', to:'2026-12-31', cpTotal:10, revTotal:0, label:'CDD' }
  ],
  'Agathe': [
    // Alternance 1 an : 1 fév 2026 → 31 jan 2027 · 25 CP + 5 révision
    { from:'2026-02-01', to:'2027-01-31', cpTotal:25, revTotal:5, label:'Alternance' }
  ],
  'Julie': [
    // Alternance : août 2025 → 31 août 2026 · 25 CP + 5 révision
    { from:'2025-08-01', to:'2026-08-31', cpTotal:25, revTotal:5, label:'Alternance' },
    // CDI 1ère période : 1 sept 2026 → 31 mai 2027 · 23 CP (9 mois × 2,5j = 22,5 → arrondi ↑)
    { from:'2026-09-01', to:'2027-05-31', cpTotal:23, revTotal:0, label:'CDI' }
    // À partir du 1 juin 2027 : cycles standard juin→mai (CP_TOTAL = 25, cpYearBounds)
  ]
};

// Retourne la période de contrat de l'employé à la date k (ou null)
function getCPPeriod(emp, k) {
  const periods = CP_CONFIG[emp];
  if (!periods) return null;
  for (const p of periods) {
    if (k >= p.from && (p.to === null || k <= p.to)) return p;
  }
  return null;
}

function cpYearBounds(k) {
  const d = fromKey(k);
  const yr = d.getMonth() >= 5 ? d.getFullYear() : d.getFullYear() - 1; // année CP : juin→mai
  return { start: yr + '-06-01', end: (yr + 1) + '-05-31' };
}

function countCPUsed(b, emp, k) {
  const period = getCPPeriod(emp, k);
  let start, end;
  if (period) {
    if (period.useYearBounds) {
      const bnds = cpYearBounds(k);
      start = period.from > bnds.start ? period.from : bnds.start; // max(contractStart, cpYearStart)
      end   = bnds.end;
    } else {
      start = period.from;
      end   = period.to || k;
    }
  } else {
    const bnds = cpYearBounds(k);
    start = bnds.start;
    end   = bnds.end;
  }
  const sched = state.boutiques[b].schedule || {};
  let count = 0;
  for (const dk in sched) {
    if (dk < start || dk > end || dk > k) continue;
    // CP RÉVISION (quota séparé de 5j) → ne compte PAS dans les CP normaux
    if (sched[dk]?.[emp] === 'conges' && !isRevisionCP(b, dk, emp)) count++;
  }
  return count;
}

// Détecte si un jour CP est un "CP Révision" (note contient RÉVISION)
function isRevisionCP(b, k, emp) {
  const note = (state.boutiques[b].statusNotesAM?.[k]?.[emp]
             || state.boutiques[b].statusNotes?.[k]?.[emp] || '').toUpperCase();
  return /\b(R[ÉE]VISION|RÉVISION|REVISION)\b/.test(note);
}

// CP de révision utilisés dans la période (CP + note RÉVISION)
function countRevisionCPUsed(b, emp, k) {
  const period = getCPPeriod(emp, k);
  if (!period || !period.revTotal) return 0;
  const start = period.from;
  const end   = period.to || k;
  const sched = state.boutiques[b].schedule || {};
  let count = 0;
  for (const dk in sched) {
    if (dk < start || dk > end || dk > k) continue;
    if (sched[dk]?.[emp] === 'conges' && isRevisionCP(b, dk, emp)) count++;
  }
  return count;
}

// Stub kept for compat (plus utilisé directement)
function countRevisionUsed(b, emp, k) { return countRevisionCPUsed(b, emp, k); }
function consecutiveWorkDays(b, k, emp) {
  const d0 = fromKey(k);
  if (!WORK_STATUSES.has(getEffectiveStatus(b, k, emp, isDayFerme(b, k, d0)))) return 0;
  let count = 1;
  let d = addDays(d0, -1);
  for (let i = 0; i < 13; i++) {
    const dk = toKey(d);
    if (!WORK_STATUSES.has(getEffectiveStatus(b, dk, emp, isDayFerme(b, dk, d)))) break;
    count++;
    d = addDays(d, -1);
  }
  return count;
}

// ═══ FÉRIÉS FRANÇAIS ══════════════════════════
function easterDate(y) {
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4;
  const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3);
  const h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4;
  const l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
  return new Date(y,month-1,day);
}
function isFerie(d) {
  const y=d.getFullYear(),mo=d.getMonth()+1,day=d.getDate();
  const fixed={'1-1':"Jour de l'An",'5-1':'Fête du Travail','5-8':'Victoire 1945',
    '7-14':'Fête Nationale','8-15':'Assomption','11-1':'Toussaint',
    '11-11':'Armistice','12-25':'Noël'};
  if(fixed[mo+'-'+day]) return fixed[mo+'-'+day];
  const e=easterDate(y);
  const mv=[[0,'Pâques'],[1,'Lundi de Pâques'],[39,'Ascension'],[49,'Pentecôte'],[50,'Lundi de Pentecôte']];
  for(const [n,name] of mv){
    const f=new Date(e); f.setDate(f.getDate()+n);
    if(f.getMonth()===d.getMonth()&&f.getDate()===d.getDate()) return name;
  }
  return null;
}

// ═══ DATE UTILS ═══════════════════════════════
function toKey(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fromKey(k) { const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function getISOWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}
function addDays(d,n) { const c=new Date(d); c.setDate(c.getDate()+n); return c; }
function isToday(d) { const t=new Date(); t.setHours(0,0,0,0); const c=new Date(d); c.setHours(0,0,0,0); return c.getTime()===t.getTime(); }

// ═══ DATA HELPERS ═════════════════════════════
function getStatus(b,k,e) {
  const s = state.boutiques[b].schedule?.[k]?.[e] || 'off';
  return s === 'jf' ? 'off' : s; // JF supprimé → OFF
}
function setStatus(b,k,e,s) {
  if(!state.boutiques[b].schedule[k]) state.boutiques[b].schedule[k]={};
  state.boutiques[b].schedule[k][e]=s;
  // Sync croisé : si l'employé existe dans l'autre boutique, on copie le statut
  const other = b === 'bulle' ? 'delorme' : 'bulle';
  if (state.boutiques[other].employees.includes(e)) {
    if(!state.boutiques[other].schedule[k]) state.boutiques[other].schedule[k]={};
    state.boutiques[other].schedule[k][e]=s;
  }
}
function getNote(b,k) { return state.boutiques[b].notes?.[k] || ''; }
function setNote(b,k,v) { if(!state.boutiques[b].notes) state.boutiques[b].notes={}; state.boutiques[b].notes[k]=v; }
// ── Demi-journée AM/PM ────────────────────────
function getStatusPM(b,k,e) { return state.boutiques[b].schedulePM?.[k]?.[e] ?? null; }
function setStatusPM(b,k,e,s) {
  if (!state.boutiques[b].schedulePM) state.boutiques[b].schedulePM = {};
  if (!state.boutiques[b].schedulePM[k]) state.boutiques[b].schedulePM[k] = {};
  state.boutiques[b].schedulePM[k][e] = s;
  // Sync croisé
  const other = b==='bulle'?'delorme':'bulle';
  if (state.boutiques[other].employees.includes(e)) {
    if (!state.boutiques[other].schedulePM) state.boutiques[other].schedulePM = {};
    if (!state.boutiques[other].schedulePM[k]) state.boutiques[other].schedulePM[k] = {};
    state.boutiques[other].schedulePM[k][e] = s;
  }
}
function clearStatusPM(b,k,e) {
  if (state.boutiques[b].schedulePM?.[k]) delete state.boutiques[b].schedulePM[k][e];
  const other = b==='bulle'?'delorme':'bulle';
  if (state.boutiques[other].employees.includes(e) && state.boutiques[other].schedulePM?.[k])
    delete state.boutiques[other].schedulePM[k][e];
}
function getStatusSoir(b,k,e) { return state.boutiques[b].scheduleSoir?.[k]?.[e] ?? null; }
function setStatusSoir(b,k,e,s) {
  if (!state.boutiques[b].scheduleSoir) state.boutiques[b].scheduleSoir = {};
  if (!state.boutiques[b].scheduleSoir[k]) state.boutiques[b].scheduleSoir[k] = {};
  state.boutiques[b].scheduleSoir[k][e] = s;
  const other = b==='bulle'?'delorme':'bulle';
  if (state.boutiques[other].employees.includes(e)) {
    if (!state.boutiques[other].scheduleSoir) state.boutiques[other].scheduleSoir = {};

    state.boutiques[other].scheduleSoir[k][e] = s;

}

function getFHBookings(k) {

function timeToSort(t) {
  if (!t) return 9999;
  const m = t.match(/(\d{1,2})[h:](\d{0,2})/);
  if (!m) return 9999;
  return parseInt(m[1]) * 100 + parseInt(m[2] || '0');
}

// Regroupe les réservations FH du même créneau (heure + activité) sur 1 ligne
function getGroupedFHBookings(k) {
  const b = state.currentBoutique;
  const raw = (fhBookings[k] || []).filter(ev => ev.boutique === b);
  const groups = [];
  const keyMap = {};
  for (const bk of raw) {
    const gKey = (bk.time||'') + '§§' + (bk.activity||'');
    const resolvedVia = (bk.bookingPk && fhTags[bk.bookingPk] !== undefined) ? fhTags[bk.bookingPk] : bk.via;
    const part = { pax: bk.pax, langFlag: bk.langFlag, langCode: bk.langCode, clientName: bk.clientName, via: resolvedVia, comment: bk.comment, bookingPk: bk.bookingPk, status: bk.status };
    if (gKey in keyMap) {
      const g = groups[keyMap[gKey]];
      g.pax += (bk.pax || 0);
      g.participants.push(part);
    } else {
      keyMap[gKey] = groups.length;
      groups.push({
        dateKey: bk.dateKey, time: bk.time, activity: bk.activity,
        pax: bk.pax || 0, status: bk.status, source: 'fareharbor',
        participants: [part]
      });
    }
  }
  return groups;
}

function getAllBookings(b,k) {

  const manual = getManualBookings(b,k).map((bk, i) => Object.assign({}, bk, { _manualIdx: i }));
  const all = [...fh, ...manual];
  // Sort chronologically by time (10h30 → 1030)
  all.sort((a, bb) => timeToSort(a.time) - timeToSort(bb.time));
  return all;
}
function maxGroupPax(b,k) { return getAllBookings(b,k).reduce((m,bk)=>Math.max(m,bk.pax||0),0); }
function absentCount(b,k) {
  const sc = state.boutiques[b].schedule?.[k]||{};
  // Monique et postes CDD ne comptent pas dans le seuil d'alerte (postes optionnels)

    .length;
}

// ═══ CAVEAU FERME ═════════════════════════════
// Caveau André Delorme : fermé Dim (0) + Lun (1) ; Jan+Fév : fermé Sam (6) + Dim (0)
function isCaveauFermeDefault(d) {
  const dow = d.getDay();
  const m   = d.getMonth();
  return (m <= 1) ? (dow === 6 || dow === 0) : (dow === 0 || dow === 1);
}
// Atelier de la Bulle : fermé les dimanches sauf avril (3) → octobre (9)
function isBulleFermeDefault(d) {
  if (d.getDay() !== 0) return false; // seuls les dimanches
  const m = d.getMonth();
  return m <= 2 || m >= 10; // fermé : jan(0) fév(1) mar(2) nov(10) déc(11)
}
function isDayFerme(b, k, d) {
  const exc = state.boutiques[b].exceptions?.[k];
  if (b === 'delorme') {
    if (exc === 'ouvert') return false;
    if (exc === 'ferme')  return true;
    return isCaveauFermeDefault(d);
  }
  if (b === 'bulle') {
    if (exc === 'ouvert') return false;
    if (exc === 'ferme')  return true;
    return isBulleFermeDefault(d);
  }
  return false;
}
function toggleException(b, k) {
  const d   = fromKey(k);
  const def = b === 'delorme' ? isCaveauFermeDefault(d)
            : b === 'bulle'   ? isBulleFermeDefault(d)
            : false;
  if (!state.boutiques[b].exceptions) state.boutiques[b].exceptions = {};
  const exc = state.boutiques[b].exceptions[k];
  if (exc) {
    delete state.boutiques[b].exceptions[k]; // retirer l'exception → retour au défaut
  } else {
    state.boutiques[b].exceptions[k] = def ? 'ouvert' : 'ferme'; // exception opposée au défaut
  }
  scheduleSave();
  render();
}
// Retourne false si l'employé est hors contrat à la date k (cellule vide, non cliquable)
function isEmpInContract(emp, k) {
  if (emp === 'Estelle' && k < '2026-01-21') return false;
  if (emp === 'Agathe'  && (k < '2026-02-02' || k > '2027-01-31')) return false;
  if (emp === 'Alice'   && k > '2026-12-31') return false;
  return true;
}
// Retourne le statut effectif : Julie = AD automatique sur jours ouverts
function getEffectiveStatus(b, k, emp, ferme) {
  // Dimanche fermé → REPOS (règle opérationnelle, priorité absolue)
  if (ferme && fromKey(k).getDay() === 0 && emp !== 'Monique' && !emp.includes('CDD')) return 'repos';

  // Valeur explicite → toujours prioritaire (permet à l'admin de réaffecter une colonne hors-contrat)
  const raw = state.boutiques[b].schedule?.[k]?.[emp];
  if (raw !== undefined) return raw;

  // Limites de contrat (défaut null si hors période, overridables ci-dessus)
  if (emp === 'Estelle' && k < '2026-01-21') return null;
  if (emp === 'Agathe'  && k < '2026-02-02') return null;
  if (emp === 'Agathe'  && k > '2027-01-31') return null;
  if (emp === 'Alice'   && k > '2026-12-31') return null;

  // Valeurs par défaut Julie (seulement si aucun override explicite)
  if (emp === 'Julie'   && !ferme) return 'ad';              // AD par défaut toujours
  if (emp === 'Julie'   && ferme && [0,1].includes(fromKey(k).getDay())) return 'repos'; // dim/lun fermé → REPOS
  // Monique et postes CDD : pas de statut par défaut (cellule vide, comme Renfort)
  if (emp === 'Monique' || emp.includes('CDD')) return null;
  // Bulle : VA par défaut (en vente à l'ADB) ; Delorme et autres : OFF
  return b === 'bulle' ? 'va' : 'off';
}

// ═══ FAREHARBOR ICS ════════════════════════════
async function fetchWithTimeout(url, ms) {
  return new Promise((res, rej) => {
    const t = setTimeout(() => rej(new Error('timeout')), ms);
    fetch(url).then(r => { clearTimeout(t); res(r); }).catch(e => { clearTimeout(t); rej(e); });
  });
}

// Fetch an ICS calendar through multiple CORS proxies; returns raw text or null
async function fetchICS(url) {
  const sources = [
    () => fetchWithTimeout(url, 7000),
    () => fetchWithTimeout('https://corsproxy.io/?' + url, 10000),
    () => fetchWithTimeout('https://api.allorigins.win/raw?url=' + encodeURIComponent(url), 10000),
    () => fetchWithTimeout('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url), 10000),
    () => fetchWithTimeout('https://thingproxy.freeboard.io/fetch/' + url, 10000)
  ];
  for (const src of sources) {
    try {
      const resp = await src();
      if (!resp.ok) continue;
      const txt = await resp.text();
      if (txt.includes('BEGIN:VEVENT')) return txt;
    } catch(e) { /* try next proxy */ }
  }
  return null;
}

// Fetch booking channels (affiliate/partner) from FH API
// Returns { bookingPk → via_code } map
async function fetchFHChannels(year) {
  const appKey  = localStorage.getItem('fh-api-app')  || '';
  const userKey = localStorage.getItem('fh-api-user') || '';
  if (!appKey || !userKey) return {};

  const FH_AFF = {
    'vignerons':'RDV', 'rdv':'RDV', 'ruedes':'RDV',
    'viator':'Viator',
    'getyourguide':'GYG', 'gyg':'GYG',
    'grapeescapes':'GE', 'grapeescapes':'GE',
  };
  const apiUrl = 'https://fareharbor.com/api/v1/companies/andre-delorme/bookings/?start-date=' + year + '-01-01&end-date=' + year + '-12-31&per_page=300';
  const hdrs   = { 'X-FareHarbor-API-App': appKey, 'X-FareHarbor-API-User': userKey, 'Accept': 'application/json' };

  const proxies = [
    () => fetch(apiUrl, { headers: hdrs }),
    () => fetch('https://corsproxy.io/?' + encodeURIComponent(apiUrl), { headers: hdrs }),
  ];
  for (const src of proxies) {
    try {
      const resp = await src();
      if (!resp.ok) continue;
      const data = await resp.json();
      const map = {};
      for (const bk of (data.bookings || [])) {
        const aff = bk.affiliate_company;
        if (!aff) continue;
        const key = (aff.shortname || aff.name || '').toLowerCase().replace(/[\s-]+/g,'');
        const via = Object.entries(FH_AFF).find(([k]) => key.includes(k));
        if (via) map[bk.pk] = via[1];
      }
      return map;
    } catch(e) { /* next */ }
  }
  return {};
}

async function syncFareHarbor() {
  const btn = document.getElementById('btn-ics');
  const msg = document.getElementById('ics-status');
  btn.disabled = true; btn.textContent = '⏳…';
  msg.style.color = '#64748b'; msg.textContent = '⏳ Récupération des calendriers…';

  // Fetch all sources in parallel (FH + Winalist pour les 2 boutiques)
  const [txtDelorme, txtBulle, txtWinalistB, txtWinalistD] = await Promise.all([
    fetchICS(FAREHARBOR_ICS_DELORME),
    fetchICS(FAREHARBOR_ICS_BULLE),
    fetchICS(WINALIST_ICS_BULLE),
    fetchICS(WINALIST_ICS_DELORME)
  ]);

  if (!txtDelorme && !txtBulle && !txtWinalistB && !txtWinalistD) {
    msg.style.color = '#dc2626'; msg.textContent = '⚠ Calendriers inaccessibles (CORS). Fonctionne depuis un serveur web.';
    btn.disabled = false; btn.textContent = '🔄 Sync FareHarbor';
    return;
  }

  // Parse each ICS and tag with boutique
  const eventsDelorme   = txtDelorme   ? parseICS(txtDelorme).map(ev =>       ({ ...ev, boutique: 'delorme' })) : [];
  const eventsBulle     = txtBulle     ? parseICS(txtBulle).map(ev =>         ({ ...ev, boutique: 'bulle'   })) : [];
  const eventsWinalistB = txtWinalistB ? parseWinalist(txtWinalistB).map(ev => ({ ...ev, boutique: 'bulle'   })) : [];
  const eventsWinalistD = txtWinalistD ? parseWinalist(txtWinalistD).map(ev => ({ ...ev, boutique: 'delorme' })) : [];
  const allEvents       = [...eventsDelorme, ...eventsBulle, ...eventsWinalistB, ...eventsWinalistD];

  // Enrich with partner/channel from FH API (if keys configured)
  msg.style.color = '#64748b'; msg.textContent = '⏳ Récupération des canaux…';
  const channelMap = await fetchFHChannels(state.currentYear);
  allEvents.forEach(ev => { if (!ev.via && ev.bookingPk && channelMap[ev.bookingPk]) ev.via = channelMap[ev.bookingPk]; });

  // Load manual tags + internal notes from Firebase
  if (db) {
    try {
      const [tagsSnap, notesSnap, overridesSnap] = await Promise.all([
        db.ref('piffaut-fh-tags').once('value'),
        db.ref('piffaut-fh-notes').once('value'),
        db.ref('piffaut-fh-overrides').once('value')
      ]);
      fhTags      = tagsSnap.val()      || {};
      fhNotes     = notesSnap.val()     || {};
      fhOverrides = overridesSnap.val() || {};
    } catch(e) { fhTags = {}; fhNotes = {}; fhOverrides = {}; }
  }
  allEvents.forEach(ev => { if (ev.bookingPk && fhTags[ev.bookingPk]) ev.via = fhTags[ev.bookingPk]; });

  // Store merged result
  fhBookings = {};
  allEvents.forEach(ev => { if (!fhBookings[ev.dateKey]) fhBookings[ev.dateKey] = []; fhBookings[ev.dateKey].push(ev); });

  // Status message
  const cntD  = eventsDelorme.length,   cntB  = eventsBulle.length;
  const cntWB = eventsWinalistB.length, cntWD = eventsWinalistD.length;
  const cntTotal = cntD + cntB + cntWB + cntWD;
  const channelCnt = Object.keys(channelMap).length;
  const tagCnt     = Object.keys(fhTags).length;
  const sourceParts = [
    cntD  > 0 ? cntD  + ' AD (FH)'       : '',
    cntWD > 0 ? cntWD + ' AD (Winalist)' : '',
    cntB  > 0 ? cntB  + ' ADB (FH)'      : '',
    cntWB > 0 ? cntWB + ' ADB (Winalist)': ''
  ].filter(Boolean).join(' · ');
  msg.style.color = '#16a34a';
  msg.textContent = '✓ ' + sourceParts + (cntTotal ? ' — ' + cntTotal + ' réservation' + (cntTotal !== 1 ? 's' : '') : '')
    + (channelCnt > 0 ? ' · ' + channelCnt + ' canal' + (channelCnt > 1 ? 'x' : '') : '')
    + (tagCnt     > 0 ? ' · ' + tagCnt     + ' tag'   + (tagCnt     > 1 ? 's' : '') : '');

  btn.disabled = false; btn.textContent = '🔄 Sync FareHarbor';
  render();
  updateMobileTodayCard(); // s'assurer que le widget jour est à jour après sync FH
  setTimeout(scrollToToday, 100); // repositionner sur aujourd'hui après reconstruction du DOM
}

// ═══ FH CSV AFFILIATE IMPORT ══════════════════
function mapFHAffiliate(raw) {
  if (!raw) return '';
  const n = raw.toLowerCase().replace(/[-\s_]+/g,'');
  if (n.includes('vignerons')||n.includes('ruedes')||n==='rdv')      return 'RDV';
  if (n.includes('getyourguide')||n.includes('gyg'))                  return 'GYG';
  if (n.includes('viator'))                                            return 'Viator';
  if (n.includes('grapeescapes')||n.includes('grapes'))               return 'GE';
  if (n.includes('frenchcour')||n.includes('myfrench'))               return 'FrenchTour';
  if (n.includes('challanges')||n.includes('chalange'))               return 'Challanges';
  if (n.includes('cotesaone')||n.includes('côtesaône')||n.includes('gosao')) return 'Go Côté Saône';
  if (n.includes('winalist'))                                                 return 'Winalist';
  if (n.includes('officetourisme')||n.includes('officedutourisme'))           return 'OT';
  if (n.includes('bourgogne')||n.includes('bfc')||n.includes('franchecomte')) return 'BFC';
  return raw.trim().slice(0,30); // keep unknown affiliates as-is
}

async function importFHAffiliatesCSV(e) {
  const file = e.target.files[0]; e.target.value=''; if (!file) return;
  const text = await file.text();
  // Detect separator (comma or semicolon)
  const sep = (text.split('\n')[0]||'').includes(';') ? ';' : ',';
  const rows = text.split('\n').map(r => r.split(sep).map(c => c.replace(/^"|"$/g,'').trim()));
  if (rows.length < 2) return toast('❌ CSV vide ou invalide', '#dc2626');

  const headers = rows[0].map(h => h.toLowerCase().replace(/[^a-z0-9]/g,''));
  // Find booking # column
  const pkCol = headers.findIndex(h =>
    h.includes('confirmation')||h.includes('booking')||h==='no'||h==='n'||h==='pk'||h==='id'||h.startsWith('#'));
  // Find affiliate column
  const affCol = headers.findIndex(h =>
    h.includes('affili')||h.includes('canal')||h.includes('channel')||h.includes('partenaire')||h.includes('source')||h.includes('bookedby'));

  if (pkCol < 0) return toast('❌ Colonne N° réservation introuvable dans le CSV', '#dc2626');
  if (affCol < 0) return toast('❌ Colonne affilié introuvable dans le CSV', '#dc2626');

  const newTags = {};
  let count = 0;
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i]; if (row.length <= Math.max(pkCol, affCol)) continue;
    const rawPk  = row[pkCol].replace(/\D/g,'');
    const rawAff = row[affCol];
    if (!rawPk || !rawAff) continue;
    const pk  = parseInt(rawPk);
    const via = mapFHAffiliate(rawAff);
    if (pk && via) { newTags[pk] = via; count++; }
  }
  if (!count) return toast('⚠ Aucun affilié trouvé dans le CSV', '#d97706');

  // Merge into fhTags and Firebase
  Object.assign(fhTags, newTags);
  if (db) {
    const updates = {};
    Object.entries(newTags).forEach(([pk, via]) => { updates['piffaut-fh-tags/' + pk] = via; });
    await db.ref().update(updates).catch(()=>{});
  }
  // Apply to live fhBookings
  Object.values(fhBookings).forEach(dayEvs => dayEvs.forEach(ev => {
    if (fhTags[ev.bookingPk]) ev.via = fhTags[ev.bookingPk];
  }));
  render();
  toast('✅ ' + count + ' affilié' + (count>1?'s':'') + ' importé' + (count>1?'s':'') + ' depuis CSV', '#16a34a');
}

// Language → { code, flag }
const LANGS = [
  { kw:['english','anglais','british'],       code:'ENG', flag:'🇬🇧' },
  { kw:['american','usa'],                     code:'USA', flag:'🇺🇸' },
  { kw:['français','french','france','fra'],   code:'FRA', flag:'🇫🇷' },
  { kw:['deutsch','german','allemand'],        code:'DEU', flag:'🇩🇪' },
  { kw:['español','spanish','espagnol'],       code:'ESP', flag:'🇪🇸' },
  { kw:['italiano','italian','italien'],       code:'ITA', flag:'🇮🇹' },
  { kw:['dutch','néerlandais','nederlands'],   code:'NLD', flag:'🇳🇱' },
  { kw:['português','portuguese','portugais'], code:'PRT', flag:'🇵🇹' },
  { kw:['chinese','chinois'],                  code:'CHN', flag:'🇨🇳' },
  { kw:['japanese','japonais'],               code:'JPN', flag:'🇯🇵' },
  { kw:['russian','russe'],                   code:'RUS', flag:'🇷🇺' },
];

function detectLang(text) {
  const lower = text.toLowerCase();
  for (const l of LANGS) {
    if (l.kw.some(k => lower.includes(k))) return l;
  }
  return null;
}

function parseICS(raw) {
  const events = [];
  const text = raw.replace(/\r\n[ \t]/g,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  text.split('BEGIN:VEVENT').slice(1).forEach(block => {
    const get = key => { const m=block.match(new RegExp('^'+key+'(?:;[^:]+)?:(.+)$','m')); return m?m[1].trim():''; };
    const dtstart  = get('DTSTART');
    const rawSum   = get('SUMMARY').replace(/\\n/g,' ').replace(/\\,/g,',').replace(/\\;/g,';');
    const rawDesc  = get('DESCRIPTION').replace(/\\n/g,'\n').replace(/\\,/g,',');
    const status   = get('STATUS');
    if (status==='CANCELLED'||!dtstart) return;

    // Date & time
    let dateKey, time;
    const dt = dtstart.replace('Z','');
    if (dt.includes('T')) {
      const [y,mo,d,h,mi]=[dt.slice(0,4),dt.slice(4,6),dt.slice(6,8),dt.slice(9,11),dt.slice(11,13)];
      dateKey=y+'-'+mo+'-'+d;
      const u=new Date(Date.UTC(+y,+mo-1,+d,+h,+mi));
      time=String(u.getHours()).padStart(2,'0')+'h'+(u.getMinutes()?String(u.getMinutes()).padStart(2,'0'):'');
    } else { dateKey=dt.slice(0,4)+'-'+dt.slice(4,6)+'-'+dt.slice(6,8); time=''; }

    // Clean activity name: strip all noise from FareHarbor SUMMARY
    // FH format: "ActivityName - TourType en Langue 🏳 ( booking: N Personnes)"
    let activity = rawSum
      .replace(/^\d+\s*[×x×]\s*/i,'')
      .replace(/\bBOOKING\s*#?\s*\d+\b/gi,'')
      .replace(/\b#\d{4,}\b/g,'')
      .replace(/\s+[-–—]\s+\S.*/,'')                        // strip " - Tour en Français…" and everything after (activity names use " : " not " - ")
      .replace(/\(\s*booking\s*:\s*[^)]+\)/gi,'')            // "( booking: 6 Personnes)" and multi-word variants
      .replace(/\(\s*\d+\s*(?:personnes?|pax|persons?|pers\.?)\s*\)/gi,'')
      .replace(/\s+(?:en|in|auf)\s+(français|anglais|english|deutsch|spanish|español|italiano|italian|dutch|português|portuguese|russian)\b.*/gi,'')
      .replace(/\s*[-–—]\s*(english|french|français|deutsch|español|italiano|dutch|portuguese|anglais|allemand|espagnol|italien)\b.*/i,'')
      .replace(/\s*\((english|french|français|deutsch|español|italiano|dutch|portuguese|anglais|allemand|espagnol|italien)\)/gi,'')
      .replace(/\s{2,}/g,' ')
      .trim();
    if (!activity) activity = 'Dégustation';

    // Canonical activity name mapping (FH internal names → display names)
    const FH_ACTIVITY_MAP = {
      'Visite & Dégustation : Saveurs du Terroir': 'Visite & Dégustation : Saveurs du Terroir (Mâchon)',
    };
    activity = FH_ACTIVITY_MAP[activity] || activity;

    // Language — from summary + desc
    const lang = detectLang(rawSum + ' ' + rawDesc);
    const langFlag = lang ? lang.flag : '';
    const langCode = lang ? lang.code : '';
    const evStatus = status==='TENTATIVE'?'option':'confirmed';

    // ── Split multi-booking VEVENT by FH separator ──────────────────
    // FareHarbor puts multiple bookings in one VEVENT description,
    // each block ending with "----------" separator
    const descBlocks = rawDesc.split(/\n\s*-{3,}\s*\n/).map(b=>b.trim()).filter(Boolean);

    if (descBlocks.length === 0) {
      const pm = rawSum.match(/(\d+)\s*(?:pax|personnes?|adultes?|participants?)/i);
      events.push({ dateKey, time, pax: pm?parseInt(pm[1]):1, status:evStatus, activity, langFlag, langCode, clientName:'', via:'', comment:'', source:'fareharbor' });
      return;
    }

    for (const bk of descBlocks) {
      const lines = bk.split('\n').map(l=>l.trim()).filter(Boolean);

      // bookingPk + clientName: line immediately after "BOOKING #XXXXXXXX"
      let clientName = '', bookingPk = 0;
      for (let i=0;i<lines.length;i++) {
        const bm = lines[i].match(/^BOOKING\s*#?(\d+)$/i);
        if (bm) {
          bookingPk = parseInt(bm[1]);
          if (lines[i+1]) clientName = lines[i+1].trim().slice(0,35);
          break;
        }
      }
      if (!clientName) {
        for (const line of lines) {
          const m = line.match(/^(?:client|customer|guest|name|nom|booked by|réservé par|contact|attendee)\s*[:\-]\s*(.+)/i);
          if (m) { clientName = m[1].trim().slice(0,35); break; }
        }
      }

      // pax: "N Personnes" / "N pax" / "N De deux à..."
      let pax = 0;
      for (const line of lines) {
        const m = line.match(/^(\d+)\s+(?:personnes?|pax|persons?|adultes?|de\s)/i);
        if (m) { pax=parseInt(m[1]); break; }
      }
      if (!pax) { const m=bk.match(/(\d+)\s*(?:pax|personnes?|adultes?|participants?)/i); if(m) pax=parseInt(m[1]); }
      if (!pax) pax=1;

      // via: detect from email domain or keywords in this booking block
      let via = '';
      const emailM = bk.match(/[\w.+%-]+@([\w.-]+\.\w+)/);
      if (emailM) {
        const dom = emailM[1].toLowerCase();
        if (dom.includes('grapeescapes')) via='GE';
        else if (dom.includes('viator')) via='Viator';
        else if (dom.includes('getyourguide')||dom.includes('gyg.')) via='GYG';
        else if (dom.includes('vignerons')||dom.includes('rdv')) via='RDV';
      }
      if (!via) {
        const hl=bk.toLowerCase();
        if (/rue des vignerons/.test(hl)) via='RDV';
        else if (/\bviator\b/.test(hl)) via='Viator';
        else if (/get your guide|gyg/.test(hl)) via='GYG';
        else if (/grape escapes/.test(hl)) via='GE';
      }

      // comment
      let comment = '';
      for (const line of lines) {
        const m = line.match(/^commentaires?\s*[:\-]\s*(.+)/i);
        if (m) { comment=m[1].trim().slice(0,80); break; }
      }

      events.push({ dateKey, time, pax, status:evStatus, activity, langFlag, langCode, clientName, via, comment, bookingPk, source:'fareharbor' });
    }
  });
  return events.sort((a,b)=>(a.dateKey+a.time).localeCompare(b.dateKey+b.time));
}

// ═══ WINALIST ICS PARSER ═══════════════════════
// Format Winalist :
//   SUMMARY  : "<Activité> - N personne(s) - Payé|Non payé|Option"
//   DESCRIPTION : "<idem>\n\n<Nom Client> - <Téléphone>"
//   DTSTART  : heure locale Paris (pas de Z)
function parseWinalist(raw) {
  const events = [];
  const text = raw.replace(/\r\n[ \t]/g,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  text.split('BEGIN:VEVENT').slice(1).forEach(block => {
    const get = key => { const m=block.match(new RegExp('^'+key+'(?:;[^:]+)?:(.+)$','m')); return m?m[1].trim():''; };
    const dtstart = get('DTSTART');
    const rawSum  = get('SUMMARY').replace(/\\n/g,' ').replace(/\\,/g,',').replace(/\\;/g,';');
    const rawDesc = get('DESCRIPTION').replace(/\\n/g,'\n').replace(/\\,/g,',');
    const status  = get('STATUS');
    if (!dtstart) return;
    if (status === 'CANCELLED' || /annul[eé]/i.test(rawSum)) return;

    // Date & time — Winalist envoie l'heure locale Paris (pas UTC)
    let dateKey, time = '';
    const dt = dtstart.replace('Z','');
    if (dt.includes('T')) {
      const [y,mo,d,h,mi] = [dt.slice(0,4),dt.slice(4,6),dt.slice(6,8),dt.slice(9,11),dt.slice(11,13)];
      dateKey = y+'-'+mo+'-'+d;
      time    = h+'h'+(mi && mi!=='00' ? mi : '');
    } else {
      dateKey = dt.slice(0,4)+'-'+dt.slice(4,6)+'-'+dt.slice(6,8);
    }

    // Pax — "N personne(s)"
    const paxM = rawSum.match(/(\d+)\s*personne/i);
    const pax  = paxM ? parseInt(paxM[1]) : 1;

    // Statut de paiement → status interne
    let evStatus = 'confirmed';
    if (/non\s*pay[eé]/i.test(rawSum))  evStatus = 'a_regler';
    else if (/option/i.test(rawSum))    evStatus = 'option';

    // Nom d'activité — partie avant " - N personne"
    const actM   = rawSum.match(/^(.+?)\s*-\s*\d+\s*personne/i);
    const activity = actM ? actM[1].trim() : 'Dégustation';

    // Nom client — après double saut de ligne dans DESCRIPTION
    let clientName = '';
    const descParts = rawDesc.split('\n\n');
    if (descParts.length >= 2) {
      const clientLine = descParts[descParts.length - 1].trim();
      clientName = clientLine.split(/\s*-\s*/)[0].trim().slice(0, 35);
    }

    // Détection de langue
    const lang     = detectLang(rawSum + ' ' + rawDesc);
    const langFlag = lang ? lang.flag : '';
    const langCode = lang ? lang.code : '';

    events.push({ dateKey, time, pax, status: evStatus, activity,
      langFlag, langCode, clientName,
      via: 'Winalist', comment: '', bookingPk: 0, source: 'winalist' });
  });
  return events.sort((a,b)=>(a.dateKey+a.time).localeCompare(b.dateKey+b.time));
}

  emps.forEach(() => html += '<col class="col-emp">');

  html += '<th data-col="pax"><div class="th-inner">Pax' + rh('pax') + '</div></th>';
  emps.forEach((e, idx) => {
    const label = e.length > 10 ? e.split(' ')[0] : e;
    const today = toKey(new Date());
    const cpP   = getCPPeriod(e, today);
    const titleTip = 'Renommer : ' + esc(e) + (cpP ? ' · ' + cpP.label + (cpP.to ? ' → ' + cpP.to : ' (CDI)') + ' · CP: ' + cpP.cpTotal + 'j' + (cpP.revTotal ? ' + ' + cpP.revTotal + 'j révision' : '') : '');
    html += '<th class="th-emp" data-col="emp-' + idx + '" onclick="openRenameEmpModal(\'' + b + '\',' + idx + ')" title="' + titleTip + '"><div class="th-inner">' + esc(label) + rh('emp-' + idx) + '</div></th>';
  });
  const _rl = state.boutiques[b].renfortLabels || ['Renfort 1','Renfort 2'];
  const _isAdminRender = authUser && isAdmin(authUser.email);
  html += '<th class="th-renfort" data-col="renfort-0"' + (_isAdminRender ? ' onclick="openRenameColModal(\'renfort-0\')" style="cursor:pointer" title="Renommer"' : '') + '><div class="th-inner">' + esc(_rl[0]) + rh('renfort-0') + '</div></th>';
  html += '<th class="th-renfort" data-col="renfort-1"' + (_isAdminRender ? ' onclick="openRenameColModal(\'renfort-1\')" style="cursor:pointer" title="Renommer"' : '') + '><div class="th-inner">' + esc(_rl[1]) + rh('renfort-1') + '</div></th>';
  html += '</tr></thead><tbody>';

  const alertDaysList = [];
  let   lastMonth = -1;
  let   d = new Date(year, 0, 1);
  const end = new Date(year, 11, 31);

  while (d <= end) {
    const m = d.getMonth();
    if (m !== lastMonth) {
      lastMonth = m;
      html += '<tr class="month-sep"><td colspan="' + (emps.length+7) + '">' + MONTHS_FR[m] + ' ' + year + '</td></tr>';
    }

    const k        = toKey(d);
    const dow      = d.getDay();
    const today    = isToday(d);
    const alert    = isAlert(b, k);
    const bookings = getAllBookings(b, k);
    const note     = getNote(b, k);
    // Regrouper par horaire : plusieurs réservations à la même heure → une seule ligne
    const timeGroups = [];
    { let offset = 0;
      for (const bk of bookings) {
        const t = bk.time || '—';
        const last = timeGroups[timeGroups.length - 1];
        if (last && last.time === t) { last.items.push(bk); last.totalPax += (bk.pax||0); }
        else { timeGroups.push({ time: t, items: [bk], totalPax: bk.pax||0, startIdx: offset }); }
        offset++;
      }
    }
    const rows     = Math.max(timeGroups.length, 1);
    const ferme    = isDayFerme(b, k, d);
    const exc      = state.boutiques[b].exceptions?.[k] || null;
    const ferie    = isFerie(d);

    if (alert) alertDaysList.push({ d: new Date(d), k });

    const rowCls = ['day-row','day-first',
      ferie  ? 'row-ferie'    : '',
      ferme  ? 'row-ferme'    : '',
      today  ? 'row-today'    : '',
      dow===0 ? 'row-sunday'  : '',
      dow===1 ? 'row-monday'  : '',
      dow===6 ? 'row-saturday': '',
      alert  ? 'row-alert'   : ''
    ].filter(Boolean).join(' ');

    const subCls = ['day-row',
      ferie  ? 'row-ferie'    : '',
      ferme  ? 'row-ferme'    : '',
      today  ? 'row-today'    : '',
      dow===0 ? 'row-sunday'  : '',
      dow===1 ? 'row-monday'  : '',
      dow===6 ? 'row-saturday': '',
      alert  ? 'row-alert'   : ''
    ].filter(Boolean).join(' ');

    // ── FIRST ROW ──
    const weekEndCls = '';
    html += '<tr class="' + rowCls + weekEndCls + '" id="day-' + k + '">';

    // Jour (rowspan) + bouton exception (toutes boutiques)
    let jourContent = DAYS_FR[dow];
    if (dow === 1) {
      const wn = getISOWeek(d);
      jourContent += '<span style="display:block;font-size:8px;font-weight:800;background:#cbd5e1;color:#334155;border-radius:3px;padding:0 3px;margin-top:1px;letter-spacing:.03em">S' + wn + '</span>';
    }
    {
      const excTitle = exc
        ? 'Annuler l\'exception (retour au défaut)'

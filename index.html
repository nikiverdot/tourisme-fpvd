        : '';
      jourContent += '<span class="exc-toggle" onclick="event.stopPropagation();toggleException(\'' + b + '\',\'' + k + '\')" title="' + excTitle + '">⚙</span>' + excIcon;
    }
    html += '<td class="jour-cell" rowspan="' + rows + '">' + jourContent + '</td>';

    // Date (rowspan)
    html += '<td class="date-cell" rowspan="' + rows + '"><span class="date-num">' + d.getDate() + '</span><span class="date-month">' + MONTHS_SHORT[m] + '</span>' + (ferie ? '<span class="ferie-label">' + esc(ferie) + '</span>' : '') + '</td>';

    // RDV/Notes (rowspan)
    const canEditNote = currentUserRole !== 'viewer';
    html += '<td class="rdv-cell' + (note?' has-note':'') + '" data-col="rdv" rowspan="' + rows + '"' + (canEditNote ? ' onclick="openNoteModal(\'' + b + '\',\'' + k + '\')"' : '') + '>';
    html += note ? '<span class="rdv-text">' + esc(note) + '</span>' : (canEditNote ? '<span class="rdv-add">+ note</span>' : '');
    html += '</td>';

    // Visite unique (rowspan=rows) — tous les horaires du jour dans une seule cellule

      const clickEvt = canEdit ? 'onclick="openStatusModal(\'' + b + '\',\'' + k + '\',\'' + emp.replace(/'/g,"\\'") + '\')"' : '';
      const lockedCls = canEdit ? '' : ' emp-cell-locked';
      const snAM   = getStatusNoteAM(b, k, emp);   // note matin (fallback → statusNotes)
      const snPM   = getStatusNotePM(b, k, emp);   // note après-midi
      const snSoir = getStatusNoteSoir(b, k, emp); // note soir
      const noteHtmlAM   = snAM   ? '<span class="status-note-sm">' + esc(snAM)   + '</span>' : '';
      const noteHtmlPM   = snPM   ? '<span class="status-note-sm">' + esc(snPM)   + '</span>' : '';
      const noteHtmlSoir = snSoir ? '<span class="status-note-sm">' + esc(snSoir) + '</span>' : '';
      const consecHtml = consec>=6 ? '<span style="font-size:7px;opacity:.8">'+consec+'j</span>' : '';
      const cpPeriod = getCPPeriod(emp, k);

        html += '<td class="emp-cell' + lockedCls + '" data-col="emp-' + empIdx + '" data-key="' + k + '" data-emp="' + esc(emp) + '" rowspan="' + rows + '">' +
          '<div class="status-cell' + warnCls + '" style="padding:0;gap:0;overflow:hidden;border-color:#94a3b8" ' + clickEvt + ' title="Matin: ' + sLabel + (snAM?' ('+snAM+')':'') + ' · Après-midi: ' + sPMLabel + (snPM?' ('+snPM+')':'') + ' · Soir: ' + sSoirLabel + (snSoir?' ('+snSoir+')':'') + warnTip + '">' +
          '<div class="status-third ' + sClass      + '" style="border-bottom:1px solid rgba(0,0,0,.08)">' + sAbbr   + '<span class="half-tag">M</span>' + noteHtmlAM   + '</div>' +
          '<div class="status-third ' + sPMClass    + '" style="border-bottom:1px solid rgba(0,0,0,.08)">' + sPMAbbr + '<span class="half-tag">A</span>' + noteHtmlPM   + '</div>' +
          '<div class="status-third ' + sSoirClass  + '">' + sSoirAbbr + '<span class="half-tag">S</span>' + noteHtmlSoir + '</div>' +
          '</div></td>';
      } else if (sPM !== null && !ferme) {
        // Cellule demi-journée : AM en haut, PM en bas
        const sPMClass = STATUS_CLASSES[sPM] || '';
        const sPMAbbr  = STATUS_ABBR[sPM]    || '';
        const sPMLabel = STATUS_LABELS[sPM]  || '—';
        html += '<td class="emp-cell' + lockedCls + '" data-col="emp-' + empIdx + '" data-key="' + k + '" data-emp="' + esc(emp) + '" rowspan="' + rows + '">' +
          '<div class="status-cell' + warnCls + '" style="padding:0;gap:0;overflow:hidden;border-color:#94a3b8" ' + clickEvt + ' title="Matin: ' + sLabel + (snAM?' ('+snAM+')':'') + ' · Après-midi: ' + sPMLabel + (snPM?' ('+snPM+')':'') + warnTip + '">' +
          '<div class="status-half ' + sClass   + '" style="border-bottom:1px solid rgba(0,0,0,.08)">' + sAbbr   + '<span class="half-tag">M</span>' + noteHtmlAM + '</div>' +
          '<div class="status-half ' + sPMClass + '">' + sPMAbbr + '<span class="half-tag">A</span>' + noteHtmlPM + '</div>' +
          '</div></td>';
      } else {
        html += '<td class="emp-cell' + lockedCls + '" data-col="emp-' + empIdx + '" data-key="' + k + '" data-emp="' + esc(emp) + '" rowspan="' + rows + '"><div class="status-cell ' + sClass + (alert?' cell-alert':'') + warnCls + '" ' + clickEvt + ' title="' + sLabel + (snAM?' · '+snAM:'') + warnTip + '">' + sAbbr + cpHtml + consecHtml + noteHtmlAM + '</div></td>';
      }
    });

    // Renfort cells (rowspan)
    const rf = bout.renforts?.[k] || ['',''];
    for (let ri = 0; ri < 2; ri++) {
      const rfName = rf[ri] || '';
      const rfClick = (ferme || !canEditRenfort(b)) ? '' : 'onclick="openRenfortModal(\'' + b + '\',\'' + k + '\',' + ri + ')"';
      html += '<td class="renfort-cell" data-col="renfort-' + ri + '" rowspan="' + rows + '">';
      if (rfName) {
        html += '<span class="renfort-chip" ' + rfClick + '>👤 ' + esc(rfName) + '</span>';
      } else {
        html += '<span class="renfort-empty" ' + rfClick + '>+</span>';
      }
      html += '</td>';
    }
    html += '</tr>';

    // ── ADDITIONAL ROWS (one per time group, not per booking) ──
    for (let gi = 1; gi < timeGroups.length; gi++) {
      const g = timeGroups[gi];
      const isLast = (gi === timeGroups.length - 1);
      const weCls = '';
      html += '<tr class="' + subCls + weCls + '">';
      // Pas de visite-cell ici : elle est couverte par le rowspan de la première ligne
      html += '<td class="pax-cell' + (g.totalPax>=10?' pax-big':'') + '" data-col="pax">' + (g.totalPax||'') + '</td>';
      html += '</tr>';
    }

    d = addDays(d, 1);
  }

  html += '</tbody>';
  document.getElementById('planning-table').innerHTML = html;
  applyColStyles();

  // Alerts banner
  document.getElementById('alerts-container').innerHTML = alertDaysList.map(a =>
    '<div style="background:#fef2f2;border-left:3px solid #ef4444;padding:5px 14px;font-size:11px;color:#dc2626;font-weight:600">⚠ <strong>' +
    DAYS_FR[a.d.getDay()] + ' ' + a.d.getDate() + ' ' + MONTHS_FR[a.d.getMonth()] +
    '</strong> — 3+ absences + groupe 10+ pax</div>'
  ).join('');

  updateMobileTodayCard();
  updateActivityDots();
  setTimeout(updateStickyLeftOffsets, 0); // recalcule les offsets left après layout
}

// Recalcule les CSS variables --freeze-* selon les largeurs réelles des colonnes figées
function updateStickyLeftOffsets() {
  const table = document.querySelector('#table-' + state.currentBoutique + ' table');
  if (!table) return;
  const firstRow = table.querySelector('tbody tr.day-first');
  if (!firstRow) return;
  const jour = firstRow.querySelector('td.jour-cell');
  const date = firstRow.querySelector('td.date-cell');
  const rdv  = firstRow.querySelector('td.rdv-cell');
  if (!jour) return;
  const r = document.documentElement;
  let left = 0;
  r.style.setProperty('--freeze-jour',   left + 'px');
  left += jour.offsetWidth;
  r.style.setProperty('--freeze-date',   left + 'px');
  if (date) left += date.offsetWidth;
  r.style.setProperty('--freeze-rdv',    left + 'px');
  if (rdv)  left += rdv.offsetWidth;
  r.style.setProperty('--freeze-visite', left + 'px');
}

// Abréviations des partenaires → noms complets
const VIA_DISPLAY = { 'GE': 'Grape Escapes', 'RDV': 'Rue des Vignerons' };

// ── Corps d'une réservation sans le préfixe horaire ──
function buildVisiteBody(bk) {
  const isFH = bk.source === 'fareharbor';
  const isBulle = state.currentBoutique === 'bulle';
  const viaLabel = v => '<span style="font-size:13px;font-weight:900;color:#0000ff">('+esc(VIA_DISPLAY[v]||v)+')</span>';
  const regler = '<span style="font-size:10px;font-weight:800;color:#b91c1c;background:#fef2f2;padding:1px 5px;border-radius:3px;border:1px solid #fca5a5">(À RÉGLER)</span>';

  if (isFH) {
    const participants = bk.participants || [{ pax: bk.pax, langFlag: bk.langFlag, langCode: bk.langCode, clientName: bk.clientName, via: bk.via, bookingPk: bk.bookingPk }];
    const fhBadge = '<span style="color:#0000ff;font-size:13px;font-weight:900">(FH)</span>';
    const partStr = participants.map(p => {
      const ov = (p.bookingPk && fhOverrides[p.bookingPk]) || {};
      const clientName = ov.clientName !== undefined ? ov.clientName : (p.clientName || '');
      const langFlag   = ov.langFlag   !== undefined ? ov.langFlag   : (p.langFlag   || '');
      const status     = ov.status     !== undefined ? ov.status     : (p.status     || 'confirmed');
      const parts = [];
      if (p.pax)      parts.push(p.pax + 'pax');
      if (langFlag)   parts.push(langFlag);
      if (clientName) parts.push(esc(clientName));
      parts.push(p.via ? viaLabel(p.via) : fhBadge);
      const internalNote = p.bookingPk && fhNotes[p.bookingPk];
      if (internalNote) parts.push('<span style="font-size:10px;color:#64748b;font-style:italic">📝 ' + esc(internalNote.slice(0,40)) + '</span>');
      if (status === 'a_regler' || p.via === 'RDV') parts.push(regler);
      return parts.join(' ');
    }).join(' <span style="color:#64748b;font-weight:900"> + </span>');
    return isBulle ? partStr : esc(bk.activity || 'Dégustation') + ' — ' + partStr;
  } else {
    // Réservation manuelle
    const desc     = esc(bk.description || '');
    const paxPart  = bk.pax ? bk.pax + 'pax' : '';
    const comm     = bk.comment ? esc(bk.comment.slice(0,40)) : '';
    const priceTag = bk.price ? ' <span style="color:#475569;font-size:10px">(' + esc(bk.price) + ')</span>' : '';
    const via      = bk.via || '';
    let langPart = [bk.langCode, bk.langFlag].filter(Boolean).join(' ');
    if (bk.langCode === 'GUIDÉE') langPart = '👤 GUIDÉE' + (bk.guide ? ' (' + esc(bk.guide).toUpperCase() + ')' : '') + (bk.guideLanguage ? ' ' + bk.guideLanguage : '');
    let body;
    if (bk.activity && !isBulle) {
      // Delorme : afficher le nom de la prestation
      body = esc(bk.activity)
        + (langPart ? ' <span style="color:#64748b">' + langPart + '</span>' : '')
        + (paxPart  ? ' — ' + paxPart : '')
        + (desc     ? ' ' + desc : '')
        + (via      ? ' ' + viaLabel(via) : '')
        + priceTag
        + (comm     ? ' <span style="color:#94a3b8;font-size:12px"> · ' + comm + '</span>' : '');
    } else {
      // Bulle (ou sans prestation) : format court — pax + langue + description + via
      body = (paxPart ? paxPart : '')
        + (langPart ? ' <span style="color:#64748b">' + langPart + '</span>' : '')
        + (desc     ? (paxPart || langPart ? ' ' : '') + desc : '')
        + (via      ? ' ' + viaLabel(via) : '')
        + priceTag
        + (comm     ? ' <span style="color:#94a3b8;font-size:12px"> · ' + comm + '</span>' : '');
    }
    if (bk.status==='option')   body += ' <span class="visite-badge badge-option">(OPTION)</span>';
    if (bk.status==='a_regler') body += ' ' + regler;
    return body;
  }
}

// ── Construit le label complet d'une réservation (avec préfixe horaire) ──
function buildVisiteLabel(bk, showTime = true) {
  const timePart = bk.time || '—';

  return showTime ? '<strong>' + timePart + '</strong> : ' + body : body;
}

// ── Check-in helpers ──────────────────────────────────────────────────────────
function safeFirebaseKey(s) {
  return (s||'').replace(/[.#$[\]/]/g,'_').replace(/\s+/g,'_').slice(0,100);
}
function getCheckin(boutique, dateKey, timeKey) {
  return (checkinData[boutique] && checkinData[boutique][dateKey] && checkinData[boutique][dateKey][timeKey]) || null;
}
function toggleCheckin(boutique, dateKey, timeKey) {
  if (currentUserRole === 'viewer') return;
  if (!db) return;
  const current = getCheckin(boutique, dateKey, timeKey);
  const next = current === null ? 'arrived' : (current === 'arrived' ? 'noshow' : null);
  if (!checkinData[boutique]) checkinData[boutique] = {};
  if (!checkinData[boutique][dateKey]) checkinData[boutique][dateKey] = {};
  if (next === null) delete checkinData[boutique][dateKey][timeKey];
  else checkinData[boutique][dateKey][timeKey] = next;
  const path = 'piffaut-checkin/' + boutique + '/' + dateKey + '/' + timeKey;
  if (next === null) db.ref(path).remove();
  else db.ref(path).set(next);
  render();
}

// ── Contenu HTML d'un groupe horaire (sans l'enveloppe <td>) ──
function buildGroupCellContent(group, b, k, isLast) {
  const _canAdd = currentUserRole !== 'viewer';
  const addBtn = (isLast && _canAdd)
    ? '<div onclick="event.stopPropagation();openBookingModal(\'' + b + '\',\'' + k + '\',null)" style="display:inline-block"><span class="add-visite-btn">+ ajouter</span></div>'
    : '';
  if (group.items.length === 1) {
    const bk = group.items[0];
    const isFH = bk.source === 'fareharbor';
    const manualIdx = isFH ? group.startIdx : (bk._manualIdx !== undefined ? bk._manualIdx : group.startIdx);
    const fhTime = (bk.time||'').replace(/'/g,"\\'");
    const fhAct  = (bk.activity||'').replace(/'/g,"\\'");
    const onclick = isFH
      ? 'openFHDetail(\'' + k + '\',\'' + fhTime + '\',\'' + fhAct + '\')'
      : (_canAdd ? 'openBookingModal(\'' + b + '\',\'' + k + '\',' + manualIdx + ')' : '');
    const ckKey   = safeFirebaseKey((bk.time||'') + '_' + (isFH ? (bk.activity||'fh') + '_' + manualIdx : 'm' + manualIdx));
    const ckState = getCheckin(b, k, ckKey);
    const ckCls   = ckState ? ' ck-' + ckState : '';
    const ckIcon  = ckState === 'arrived' ? '✓' : (ckState === 'noshow' ? '✗' : '');
    const ckBtn   = currentUserRole !== 'viewer'
      ? '<span class="ck-btn' + (ckState ? ' ck-' + ckState : '') + '" onclick="event.stopPropagation();toggleCheckin(\'' + b + '\',\'' + k + '\',\'' + ckKey + '\')" title="Arrivé → No-show → Effacer">' + ckIcon + '</span>'
      : (ckState ? '<span class="ck-btn ck-' + ckState + '">' + ckIcon + '</span>' : '');
    return '<div class="visite-line' + ckCls + '"' + (onclick ? ' onclick="event.stopPropagation();' + onclick + '" style="cursor:pointer"' : '') + '>'
      + buildVisiteLabel(bk) + ckBtn + '</div>'
      + addBtn;
  }
  // Plusieurs réservations au même horaire → une seule ligne inline : "time : p1 + p2 + p3"
  const timePart = group.time || '—';
  const partsHtml = group.items.map((bk, i) => {
    const globalIdx = group.startIdx + i;
    const isFH = bk.source === 'fareharbor';
    const manualIdx = isFH ? globalIdx : (bk._manualIdx !== undefined ? bk._manualIdx : globalIdx);
    const fhTime2 = (bk.time||'').replace(/'/g,"\\'");
    const fhAct2  = (bk.activity||'').replace(/'/g,"\\'");
    const onclick = isFH
      ? 'openFHDetail(\'' + k + '\',\'' + fhTime2 + '\',\'' + fhAct2 + '\')'
      : (_canAdd ? 'openBookingModal(\'' + b + '\',\'' + k + '\',' + manualIdx + ')' : '');
    const ckKey2   = safeFirebaseKey((bk.time||'') + '_' + (isFH ? (bk.activity||'fh') + '_' + globalIdx : 'm' + globalIdx));
    const ckState2 = getCheckin(b, k, ckKey2);
    const ckIcon2  = ckState2 === 'arrived' ? '✓' : (ckState2 === 'noshow' ? '✗' : '');
    const ckBtn2   = currentUserRole !== 'viewer'
      ? '<span class="ck-btn' + (ckState2 ? ' ck-' + ckState2 : '') + '" onclick="event.stopPropagation();toggleCheckin(\'' + b + '\',\'' + k + '\',\'' + ckKey2 + '\')" title="Arrivé → No-show → Effacer">' + ckIcon2 + '</span>'
      : (ckState2 ? '<span class="ck-btn ck-' + ckState2 + '">' + ckIcon2 + '</span>' : '');
    // ck-btn é IRMÃO do span clicável (não filho) → sempre visível independente do conteúdo HTML
    const itemCls = ckState2 ? ' ck-' + ckState2 : '';
    return '<span class="visite-item' + itemCls + '">'
      + '<span ' + (onclick ? 'onclick="event.stopPropagation();' + onclick + '" style="cursor:pointer"' : '') + '>'
      + buildVisiteBody(bk)
      + '</span>'
      + ckBtn2
      + '</span>';
  }).join(' <span style="color:#94a3b8;font-weight:700;padding:0 1px"> + </span> ');
  return '<div class="visite-line"><strong>' + timePart + '</strong> : ' + partsHtml + '</div>'
    + addBtn;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ═══ COLUMN MANAGER ═══════════════════════════
// hiddenCols : { bulle: Set<string>, delorme: Set<string> }
// Les clés des colonnes employé sont le NOM de l'employé (pas l'index positonnel)
// → masquer "Agathe" en AD n'impacte pas "Agathe" dans la Bulle
let hiddenCols = { bulle: new Set(), delorme: new Set() };
let colWidths  = JSON.parse(localStorage.getItem('piffaut-col-widths') || '{}');

const COL_LABELS = {
  rdv: 'RDV / Notes', visite: 'Visites', pax: 'Pax'
};

function getColLabels() {
  const b    = state.currentBoutique;
  const emps = state.boutiques[b].employees;
  const labels = { ...COL_LABELS };
  emps.forEach(e => { labels[e] = e.split(' ')[0]; }); // clé = nom employé
  const _rlLabels = state.boutiques[b]?.renfortLabels || ['Renfort 1','Renfort 2'];
  labels['renfort-0'] = _rlLabels[0];
  labels['renfort-1'] = _rlLabels[1];
  return labels;
}

function applyColStyles() {
  const b      = state.currentBoutique;
  const emps   = state.boutiques[b]?.employees || [];
  const hidden = hiddenCols[b] || new Set();
  let css = '';
  // Résoudre le nom employé → index positionnel courant
  hidden.forEach(key => {
    if (key === 'rdv' || key === 'visite' || key === 'pax' || key === 'renfort-0' || key === 'renfort-1') {
      css += `[data-col="${key}"] { display: none !important; }\n`;
    } else {
      const idx = emps.indexOf(key);
      if (idx >= 0) css += `[data-col="emp-${idx}"] { display: none !important; }\n`;
    }
  });
  // Column widths
  Object.entries(colWidths).forEach(([col, w]) => {
    css += `[data-col="${col}"] { width: ${w}px !important; min-width: ${w}px !important; max-width: ${w}px !important; }\n`;
    css += `thead th[data-col="${col}"] { width: ${w}px !important; min-width: ${w}px !important; }\n`;
  });
  document.getElementById('col-styles').textContent = css;
}

function buildColPanel() {
  const b      = state.currentBoutique;
  const emps   = state.boutiques[b].employees;
  const hidden = hiddenCols[b] || new Set();
  const labels = getColLabels();
  const bLabel = b === 'bulle' ? '🫧 Bulle' : '🍾 André Delorme';
  const allCols = ['rdv', 'visite', 'pax', ...emps, 'renfort-0', 'renfort-1'];
  let html = `<div class="col-panel-title">Colonnes — ${bLabel}</div>`;
  allCols.forEach(col => {
    const checked = !hidden.has(col) ? 'checked' : '';
    const lbl = esc(labels[col] || col);
    const safeCol = col.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += `<label class="col-item"><input type="checkbox" ${checked} onchange="toggleCol('${safeCol}',this.checked)"> <span>${lbl}</span></label>`;
  });
  document.getElementById('col-panel').innerHTML = html;
}

function toggleColPanel(e) {
  if (e) e.stopPropagation();
  // Sur mobile : ouvrir comme modale bottom-sheet
  if (window.innerWidth <= 600) {
    buildColPanel();
    const b = state.currentBoutique;
    const bLabel = b === 'bulle' ? '🫧 Bulle' : '🍾 André Delorme';
    modalCtx = { type:'colFilter' };
    document.getElementById('modal-title').textContent = '⊞ Colonnes — ' + bLabel;
    document.getElementById('modal-body').innerHTML =
      '<div style="margin:-6px -14px 0">' + document.getElementById('col-panel').innerHTML + '</div>';
    document.getElementById('modal-actions').innerHTML =
      '<button class="btn-mp" onclick="closeModal()">Fermer</button>';
    openModal();
    return;
  }
  // Desktop : panneau déroulant
  const panel = document.getElementById('col-panel');
  const isOpen = panel.style.display !== 'none';
  if (isOpen) { panel.style.display = 'none'; return; }
  buildColPanel();
  panel.style.display = 'block';
}

function toggleCol(col, visible) {
  const b = state.currentBoutique;
  if (!hiddenCols[b]) hiddenCols[b] = new Set();
  if (visible) hiddenCols[b].delete(col);
  else         hiddenCols[b].add(col);
  applyColStyles();
  saveHiddenColsToFirebase();
}

async function saveHiddenColsToFirebase() {
  if (!db || !authUser) return;
  const data = {
    bulle:   [...(hiddenCols.bulle   || [])],
    delorme: [...(hiddenCols.delorme || [])]
  };
  try {
    await db.ref('piffaut-prefs/' + authUser.uid + '/hiddenCols').set(data);
  } catch(e) { console.warn('saveHiddenCols:', e); }
}

async function loadUserPrefs() {
  if (!db || !authUser) return;
  try {
    const snap = await db.ref('piffaut-prefs/' + authUser.uid + '/hiddenCols').once('value');
    const val  = snap.val() || {};
    hiddenCols = {
      bulle:   new Set(val.bulle   || []),
      delorme: new Set(val.delorme || [])
    };
    applyColStyles();
  } catch(e) { console.warn('loadUserPrefs:', e); }
}

document.addEventListener('click', e => {
  const panel = document.getElementById('col-panel');
  if (panel && !panel.contains(e.target) && !e.target.closest('.col-panel-wrap')) {
    panel.style.display = 'none';
  }
});

// ─── Column Resize ────────────────────────────
let _resizeState = null;

function startResize(e, col) {
  e.stopPropagation();
  e.preventDefault();
  const th = e.target.closest('th');
  if (!th) return;
  const startX = e.clientX;
  const startW = th.getBoundingClientRect().width;
  _resizeState = { col, startX, startW };
  e.target.classList.add('resizing');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
}

document.addEventListener('mousemove', e => {
  if (!_resizeState) return;
  const delta = e.clientX - _resizeState.startX;
  const newW  = Math.max(30, _resizeState.startW + delta);
  colWidths[_resizeState.col] = Math.round(newW);
  applyColStyles();
  updateStickyLeftOffsets();
});

document.addEventListener('mouseup', e => {
  if (!_resizeState) return;
  localStorage.setItem('piffaut-col-widths', JSON.stringify(colWidths));
  document.querySelectorAll('.resize-handle.resizing').forEach(el => el.classList.remove('resizing'));
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  _resizeState = null;
  updateStickyLeftOffsets(); // recalcule après redimensionnement
});

// ═══ NAVIGATION ════════════════════════════════
function switchBoutique(b) {
  state.currentBoutique = b;
  document.getElementById('col-panel').style.display = 'none'; // ferme le panel si ouvert
  render();
  applyColStyles();
  setTimeout(scrollToToday, 100);
}
function prevYear() { state.currentYear--; render(); }
function nextYear() { state.currentYear++; render(); }
function scrollToToday() {
  const el = document.getElementById('day-' + toKey(new Date()));
  if (!el) return;
  const wrap = document.querySelector('.table-wrap');
  if (!wrap) { el.scrollIntoView({behavior:'smooth', block:'start'}); return; }
  const elTop  = el.getBoundingClientRect().top;
  const wrapTop = wrap.getBoundingClientRect().top;
  wrap.scrollBy({ top: elTop - wrapTop - 8, behavior: 'smooth' });
}

function updateMobileTodayCard() {
  const card = document.getElementById('mobile-today-card');
  if (!card) return;
  const today = new Date();
  const k = toKey(today);
  document.getElementById('mtc-day').textContent   = DAYS_FR[today.getDay()];
  document.getElementById('mtc-num').textContent   = today.getDate();
  document.getElementById('mtc-month').textContent = MONTHS_FR[today.getMonth()];
  const b = state.currentBoutique;
  const bks = getAllBookings(b, k);
  const totalPax = bks.reduce((s, bk) => s + (bk.pax || 0), 0);
  document.getElementById('mtc-pax').textContent = totalPax || '—';
  const visitsEl = document.getElementById('mtc-visits');
  if (bks.length === 0) {
    visitsEl.innerHTML = '<div class="mtc-empty">Pas de visite programmée</div>';
  } else {
    visitsEl.innerHTML = bks.slice(0, 4).map(bk => {
      let body;
      if (bk.source === 'fareharbor') {
        // FH : pax + langue + nom client + via
        const parts = (bk.participants && bk.participants.length) ? bk.participants : [bk];
        body = parts.map(p => {
          const arr = [];
          if (p.pax)       arr.push(p.pax + 'pax');
          if (p.langFlag)  arr.push(p.langFlag);
          if (p.clientName) arr.push(esc(p.clientName));
          arr.push('(' + (p.via || 'FH') + ')');
          return arr.join(' ');
        }).join(' + ');
      } else {
        // Manuel : pax + langue + groupe/client + via
        const arr = [];
        if (bk.pax) arr.push(bk.pax + 'pax');
        const lang = [bk.langCode, bk.langFlag].filter(Boolean).join(' ');
        if (lang) arr.push(lang);
        if (bk.description) arr.push(esc(bk.description));
        if (bk.via) arr.push('(' + bk.via + ')');
        body = arr.join(' ');
      }
      return '<div class="mtc-visit-row">'
        + '<span class="mtc-visit-time">' + (bk.time || '—') + '</span>'
        + '<span class="mtc-visit-body">' + body + '</span>'
        + '</div>';
    }).join('') + (bks.length > 4 ? '<div class="mtc-empty">+ ' + (bks.length - 4) + ' autres…</div>' : '');
  }
}

    + '<p style="font-size:10px;color:#94a3b8;margin-top:4px">💡 Le renommage met à jour toutes les cellules. Les statuts enregistrés sont conservés.</p>';
  document.getElementById('modal-actions').innerHTML =
    '<button class="btn-ms" onclick="closeModal()">Annuler</button>'
    + '<button class="btn-mp" onclick="saveRenameEmp()">Renommer</button>';
  openModal();
  setTimeout(() => { const el=document.getElementById('f-empname'); if(el){el.focus();el.select();} }, 80);

function saveRenameEmp() {
  if (!modalCtx || modalCtx.type !== 'renameEmp') return;
  const { b, empIdx } = modalCtx;
  const newName = document.getElementById('f-empname').value.trim();
  if (!newName) return;
  const oldName = state.boutiques[b].employees[empIdx];
  if (newName === oldName) return closeModal();
  // Migrate schedule entries from old name to new name
  const sc = state.boutiques[b].schedule;
  Object.keys(sc).forEach(k => {
    if (sc[k][oldName] !== undefined) {
      sc[k][newName] = sc[k][oldName];
      delete sc[k][oldName];
    }
  });
  state.boutiques[b].employees[empIdx] = newName;
  scheduleSave();
  closeModal();
  render();
}

// ═══ PRIORITÉ ABSENCE ═════════════════════════
// Retourne le 1er collègue qui a priorité (CP ou REPOS+NPB) ce jour.
// Exception : ÉCOLE (formation) ne compte pas et n'est pas bloqué.
function getAbsencePriority(b, k, currentEmp) {
  const emps = state.boutiques[b].employees;
  for (const e of emps) {
    if (e === currentEmp) continue;
    const s = getStatus(b, k, e);
    const n = getStatusNote(b, k, e);
    const hasPriority = (s === 'conges') ||
                        (s === 'repos' && n && n.toUpperCase().includes('NPB'));
    if (hasPriority) return { emp: e, status: s, note: n };
  }
  return null;
}

function updatePriorityWarning() {
  const warn = document.getElementById('priority-warning');
  if (!warn || !modalCtx) return;
  const { b, k, emp } = modalCtx;
  // Lire le statut AM depuis le DOM (nouveau modal) ou pendingStatus (compat)
  const amEl = document.querySelector('#ps-am .status-option[data-status].selected');
  const s = amEl ? amEl.dataset.status : (pendingStatus || getStatus(b, k, emp));
  if (s !== 'conges' && s !== 'repos') { warn.style.display = 'none'; return; }
  const conflict = getAbsencePriority(b, k, emp);
  if (conflict) {
    const label = conflict.status === 'conges'
      ? 'Congés (CP)'
      : 'REPOS' + (conflict.note ? ' ' + conflict.note.toUpperCase() : '');
    warn.innerHTML = '⚠ <strong>' + esc(conflict.emp) + '</strong> a la priorité ce jour&nbsp;(' + label + ')';
    warn.style.display = 'flex';
  } else {
    warn.style.display = 'none';
  }
}

// Affiche / masque les sections Après-midi + Soir
function toggleSplitMode() {
  modalSplit = !modalSplit;
  const sections = document.getElementById('split-sections');
  const toggle   = document.getElementById('split-toggle');
  const lbl      = document.getElementById('matin-label');
  const noteAM   = document.getElementById('note-am');
  if (!modalSplit) {
    // Retour journée entière → on vide PM et Soir pour ne pas les sauver
    clearPeriodSection('pm');
    clearPeriodSection('soir');
  }
  if (sections) sections.style.display = modalSplit ? 'block' : 'none';
  if (toggle)   toggle.textContent = modalSplit ? '▲ Journée entière' : '÷ Diviser en périodes';
  if (lbl)      lbl.style.display  = modalSplit ? 'flex' : 'none';
  if (noteAM)   noteAM.placeholder = modalSplit ? 'Message matin… (ex : Soutenance, NPB)' : 'Message pour la journée… (ex : NPB, Soutenance)';
}

// Efface toutes les périodes (bouton ✕ dans les actions)
function clearAllPeriods() { ['am','pm','soir'].forEach(p => clearPeriodSection(p)); }

let pendingStatus = null;   // conservé pour compat draft
let pendingPeriod = 'full'; // conservé pour compat draft

// Sélection indépendante par période (toggle : reclicker désélectionne)
function selectPeriodStatus(period, status) {
  const container = document.getElementById('ps-' + period);
  if (!container) return;
  const wasSelected = container.querySelector('[data-status="' + status + '"].selected');
  container.querySelectorAll('.status-option[data-status]').forEach(b => b.classList.remove('selected'));
  if (!wasSelected) {
    const btn = container.querySelector('[data-status="' + status + '"]');
    if (btn) btn.classList.add('selected');
  }
  if (period === 'am') updatePriorityWarning();
}

// (compat — gardé pour saveStatus, plus exposé dans le modal)
function applyFullDay(status) {
  if (status === null) { clearAllPeriods(); }
  else { selectPeriodStatus('am', status); selectPeriodStatus('pm', status); clearPeriodSection('soir'); }
  updatePriorityWarning();
}

// Efface la sélection et la note d'une section
function clearPeriodSection(period) {
  const c = document.getElementById('ps-' + period);
  if (c) c.querySelectorAll('.status-option[data-status]').forEach(b => b.classList.remove('selected'));
  const n = document.getElementById('note-' + period);
  if (n) n.value = '';
}

// Compat draft (ancien système mono-période) — conservé pour ne pas casser les drafts
function selectPeriod(p)  { pendingPeriod = p; }
function selectStatus(s)  { pendingStatus = (s === null || pendingStatus === s) ? null : s; }

function saveStatus() {
  if (currentUserRole === 'viewer') return;
  const {b, k, emp} = modalCtx;
  const defWork = b === 'bulle' ? 'va' : 'ad';

  const amEl   = document.querySelector('#ps-am .status-option[data-status].selected');
  const pmEl   = document.querySelector('#ps-pm .status-option[data-status].selected');
  const soirEl = document.querySelector('#ps-soir .status-option[data-status].selected');
  const amS    = amEl   ? amEl.dataset.status   : null;
  const pmS    = pmEl   ? pmEl.dataset.status   : null;
  const soirS  = soirEl ? soirEl.dataset.status : null;

  const noteAM   = (document.getElementById('note-am')?.value   || '').trim();
  const notePM   = (document.getElementById('note-pm')?.value   || '').trim();
  const noteSoir = (document.getElementById('note-soir')?.value || '').trim();

  // Appliquer les statuts
  if (amS) setStatus(b, k, emp, amS); else clearStatus(b, k, emp);

  if (pmS && pmS !== amS) {
    setStatusPM(b, k, emp, pmS);
  } else if (pmS && pmS === amS && !soirS) {
    clearStatusPM(b, k, emp); // AM=PM sans soir → journée entière (compact)
  } else if (pmS) {
    setStatusPM(b, k, emp, pmS);
  } else {
    clearStatusPM(b, k, emp);
  }

  if (soirS) {
    if (!amS) setStatus(b, k, emp, defWork);
    if (!pmS) setStatusPM(b, k, emp, defWork);
    setStatusSoir(b, k, emp, soirS);
  } else {
    clearStatusSoir(b, k, emp);
  }

  // Sauvegarder les notes par période
  setStatusNoteAM(b, k, emp, noteAM);
  setStatusNotePM(b, k, emp, notePM);
  setStatusNoteSoir(b, k, emp, noteSoir);
  // Compat: statusNotes = note AM (pour détection NPB / priorité)
  setStatusNote(b, k, emp, noteAM);
  const other = b === 'bulle' ? 'delorme' : 'bulle';
  if (state.boutiques[other].employees.includes(emp)) setStatusNote(other, k, emp, noteAM);

  clearDraft(); scheduleSave(); closeModal(); render();
}

function openBookingModal(b, k, idx) {
  if (currentUserRole === 'viewer') return;
  const bks = getManualBookings(b, k);
  const bk  = idx!==null && idx>=0 ? bks[idx] : {};
  modalCtx  = { type:'booking', b, k, idx };
  const date = fromKey(k);
  const edit = idx!==null && idx>=0;
  const defStatus = edit ? (bk.status || 'confirmed') : 'confirmed';
  document.getElementById('modal-title').textContent = (edit?'Modifier':'Ajouter') + ' visite · ' + DAYS_FR[date.getDay()] + ' ' + date.getDate() + ' ' + MONTHS_FR[date.getMonth()];

  // ── Activity datalist : boutique-specific ──────────────────────────
  let actListOpts, actPlaceholder, actDefaultVal;
  if (b === 'bulle') {
    // ADB : une seule prestation
    actListOpts   = '<option value="Visite/Dégustation">';
    actPlaceholder = 'Visite/Dégustation';
    actDefaultVal  = bk.activity || 'Visite/Dégustation';
  } else {
    // AD : prestations fixes + dynamiques depuis FH Delorme
    const fhActs = new Set([
      'Dégustation Découverte de la Côte Chalonnaise',
      'Dégustation Découverte Effervescente',
      'Visite & Dégustation : de la Cave à la Coupe',
      'Visite & Dégustation : Bouchées du Terroir',
      'Visite & Dégustation : Saveurs du Terroir (Mâchon)',
      'Visite & Dégustation : Accords Vins & Mets du Chef',
    ]);
    Object.values(fhBookings).forEach(evs => evs.forEach(ev => {
      if (ev.activity && ev.boutique === 'delorme') fhActs.add(ev.activity);

    actListOpts   = [...fhActs].sort().map(a => `<option value="${esc(a)}">`).join('');

    : '<button class="btn-ms" onclick="closeModal()">Annuler</button><button class="btn-mp" onclick="saveBooking()">Ajouter</button>';

function fmtTime(inp) {
  const v = inp.value.replace(/[^\d]/g, '');
  if (!v) { inp.value = ''; return; }
  let h, m;
  if (v.length <= 2) { h = parseInt(v, 10); m = 0; }
  else { h = parseInt(v.slice(0, v.length - 2), 10); m = parseInt(v.slice(-2), 10); }
  h = Math.min(h, 23); m = Math.min(m, 59);
  inp.value = h + 'h' + String(m).padStart(2, '0');
}
function fmtPrice(inp) {
  let v = inp.value.trim();
  if (!v) return;
  const hasPax = /\/\s*pax/i.test(v);
  const num = parseFloat(v.replace(/[^\d.,]/g, '').replace(',', '.'));
  if (isNaN(num)) return;
  inp.value = num.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €' + (hasPax ? '/pax' : '');
}
function onViaChange() {
  const via = (document.getElementById('f-via')?.value || '').trim().toLowerCase();
  if (via === 'challanges' || via === 'invitation') {
    const st = document.getElementById('f-status');
    const pr = document.getElementById('f-price');
    if (st) st.value = 'confirmed';
    if (pr) pr.value = '0,00 €';
  }
}
function onDescChange() {
  const desc = (document.getElementById('f-desc')?.value || '').trim().toLowerCase();
  if (desc === 'client de passage') {
    const via = document.getElementById('f-via');
    const st  = document.getElementById('f-status');
    if (via && !via.value) via.value = 'Direct';
    if (st)  st.value = 'a_regler';
  }
}
function toggleGuideRow() {
  const langEl   = document.getElementById('f-lang');
  const guideRow = document.getElementById('guide-row');
  if (guideRow) guideRow.style.display = (langEl && langEl.value === 'GUIDÉE|') ? 'grid' : 'none';
}
function saveBooking() {
  if (currentUserRole === 'viewer') return;
  const {b,k,idx}=modalCtx;
  const timeInp = document.getElementById('f-time'); fmtTime(timeInp);
  const langVal = (document.getElementById('f-lang').value||'').split('|');
  const bk={time:timeInp.value, pax:parseInt(document.getElementById('f-pax').value)||0, status:document.getElementById('f-status').value, via:document.getElementById('f-via').value.trim(), activity:document.getElementById('f-activity').value.trim(), langCode:langVal[0]||'', langFlag:langVal[1]||'', guide:(document.getElementById('f-guide')?.value||'').trim(), guideLanguage:(document.getElementById('f-guide-lang')?.value||'').trim(), description:document.getElementById('f-desc').value.trim(), comment:document.getElementById('f-comment').value.trim(), price:document.getElementById('f-price').value.trim()};
  if(!state.boutiques[b].bookings[k]) state.boutiques[b].bookings[k]=[];
  const isNew = !(idx!==null&&idx>=0);
  if(!isNew) state.boutiques[b].bookings[k][idx]=bk;
  else state.boutiques[b].bookings[k].push(bk);
  clearDraft(); scheduleSave(); closeModal(); render();
  if (isNew) sendBookingPush(bk, b, k); // notif push si réservation ajoutée pour aujourd'hui
}
function deleteBooking() { if (currentUserRole==='viewer') return; const {b,k,idx}=modalCtx; state.boutiques[b].bookings[k].splice(idx,1); clearDraft(); scheduleSave(); closeModal(); render(); }

// ═══ MODAL HELPERS ════════════════════════════
function _modalDraftKey() { return modalCtx ? 'mdraft:' + JSON.stringify(modalCtx) : null; }
function saveDraft() {
  const k = _modalDraftKey(); if (!k) return;
  const data = { _period: pendingPeriod, _status: pendingStatus };
  document.querySelectorAll('#modal-body input, #modal-body textarea').forEach(el => { if (el.id) data[el.id] = el.value; });
  try { sessionStorage.setItem(k, JSON.stringify(data)); } catch(e) {}
}
function restoreDraft() {
  const k = _modalDraftKey(); if (!k) return;
  try {
    const raw = sessionStorage.getItem(k); if (!raw) return;
    const data = JSON.parse(raw);
    document.querySelectorAll('#modal-body input, #modal-body textarea').forEach(el => { if (el.id && data[el.id] !== undefined) el.value = data[el.id]; });
    if (data._period) selectPeriod(data._period);
    if (data._status !== undefined && data._status !== null) { pendingStatus = null; selectStatus(data._status); }
  } catch(e) {}
}
function clearDraft() { const k = _modalDraftKey(); if (k) try { sessionStorage.removeItem(k); } catch(e) {} }
function openModal() {
  pendingStatus = null;
  document.getElementById('modal-overlay').style.display = 'flex';
  setTimeout(restoreDraft, 30);
}
function closeModal() { saveDraft(); clearActivity(); document.getElementById('modal-overlay').style.display='none'; modalCtx=null; }
function overlayClick(e) { /* désactivé — fermeture uniquement via boutons */ }
document.addEventListener('keydown', e => {
  if (!modalCtx) return;
  if (e.key === 'Escape') { closeModal(); return; }
  if (e.key === 'Enter') {
    const active = document.activeElement;
    if (active && (active.tagName === 'TEXTAREA' || active.tagName === 'SELECT')) return;
    e.preventDefault();
    const btn = document.querySelector('#modal-actions .btn-mp');
    if (btn) btn.click();
  }
});

// ═══ EXPORT / IMPORT ══════════════════════════
function exportData() {
  if (!authUser || !isAdmin(authUser.email)) return toast('⛔ Accès refusé','#dc2626');
  const json=JSON.stringify({version:2,exportedAt:new Date().toISOString(),boutiques:state.boutiques},null,2);
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([json],{type:'application/json'})); a.download='planning-piffaut-'+toKey(new Date())+'.json'; a.click();
}
function importData(e) {
  if (!authUser || !isAdmin(authUser.email)) return toast('⛔ Accès refusé','#dc2626');
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader(); r.onload=ev=>{
    try {
      const data=JSON.parse(ev.target.result);
      if(data.boutiques){ Object.keys(data.boutiques).forEach(k=>{ if(state.boutiques[k]){ state.boutiques[k].schedule=data.boutiques[k].schedule||{}; state.boutiques[k].bookings=data.boutiques[k].bookings||{}; state.boutiques[k].notes=data.boutiques[k].notes||{}; } }); scheduleSave(); render(); toast('✅ Importé !','#16a34a'); }
    } catch{ toast('❌ Erreur JSON','#dc2626'); }
  }; r.readAsText(file); e.target.value='';
}

function init() {
  if (!initFirebaseCore()) {
    // Offline mode
    document.getElementById('auth-overlay').style.display = 'none';
    currentUser = localStorage.getItem('piffaut-user') || 'Anonyme';
    document.getElementById('user-avatar').textContent = currentUser.substring(0,2).toUpperCase();
    document.getElementById('user-name-label').textContent = currentUser;
    render(); setTimeout(scrollToToday, 200);
    return;
  }

  firebase.auth().onAuthStateChanged(async user => {
    if (!user) {
      document.getElementById('auth-overlay').style.display = 'flex';
      document.getElementById('auth-submit-btn').disabled = false;
      return;
    }

    // Vérifier l'autorisation (sauf admins)
    const isAdminLogin = isAdmin(user.email);
    if (!isAdminLogin) {
      try {
        const snap = await db.ref(ACL_PATH + '/' + emailKey(user.email)).once('value');
        if (!snap.exists()) {
          await firebase.auth().signOut();
          document.getElementById('auth-overlay').style.display = 'flex';
          showAuthErr("Votre email n'est pas autorisé. Contactez mfverdot@gmail.com.");
          return;
        }
        // Appliquer la boutique par défaut et le rôle de cet utilisateur
        const aclData = snap.val();
        if (aclData?.defaultBoutique) state.currentBoutique = aclData.defaultBoutique;
        // Rôle : en priorité depuis ACL ; sinon inféré depuis l'email (rétro-compat)
        const emailLc = user.email.toLowerCase();
        currentUserRole = aclData?.role
          || (emailLc === MANAGER_BULLE || emailLc === MANAGER_DELORME ? 'manager' : 'employee');
        currentUserBoutique = aclData?.defaultBoutique
          || (emailLc === MANAGER_BULLE ? 'bulle' : emailLc === MANAGER_DELORME ? 'delorme' : null);
      } catch(e) { /* Si règles pas encore configurées, on laisse passer */ }
    } else {
      currentUserRole    = 'admin';
      currentUserBoutique = null;
    }

    authUser = user;
    document.getElementById('auth-overlay').style.display = 'none';
    updateUserChip(user);
    initFirebaseData();
    initPresence(user);
    render();
    loadUserPrefs(); // charger colonnes masquées depuis Firebase
    subscribeToPush();
    setTimeout(scrollToToday, 200);
    syncFareHarbor();
  });
}

function openStatsModal() {

  const boutName = b === 'bulle' ? '🫧 Atelier de la Bulle' : '🍾 André Delorme';

  // Agrégation : partenaire → [pax jan..déc]
  const stats = {};
  const addPax = (partner, month, pax) => {
    const p = partner || '—';
    if (!stats[p]) stats[p] = new Array(12).fill(0);
    stats[p][month] += (pax || 0);
  };

  let d = new Date(year, 0, 1);
  const endDate = new Date(year + 1, 0, 1);
  while (d < endDate) {
    const k = toKey(d);
    const month = d.getMonth();

    // Réservations FH (données brutes)
    (fhBookings[k] || []).filter(ev => ev.boutique === b).forEach(ev => {
      addPax(ev.via || 'FH', month, ev.pax);
    });

    // Réservations manuelles
    getManualBookings(b, k).forEach(bk => {
      addPax(bk.via || 'Direct', month, bk.pax);
    });

    d = addDays(d, 1);
  }

  const partners = Object.keys(stats).filter(p => stats[p].reduce((a,v)=>a+v,0) > 0)
    .sort((a,z) => stats[z].reduce((s,v)=>s+v,0) - stats[a].reduce((s,v)=>s+v,0)); // tri par total desc

  const MOIS = ['Jan','Fév','Mar','Avr','Mai','Jui','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const monthTotals = new Array(12).fill(0);

  html += '</tr></thead><tbody>';

  // Lignes par partenaire
  partners.forEach((p, pi) => {

// ── Parseur CSV (séparateur ; , champs entre guillemets) ──
function parseCSVSemi(text) {
  const rows = []; let row = []; let field = ''; let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i+1]==='"') { field+='"'; i++; } else inQ=false; }
      else field += c;
    } else {
      if      (c==='"')  inQ = true;
      else if (c===';')  { row.push(field); field=''; }
      else if (c==='\n') { row.push(field); field=''; rows.push(row); row=[]; }
      else if (c!=='\r') field += c;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

// ── Convertit "3 mars" / "15 août" → "2026-03-15" ──
const CSV_MONTHS = {
  'janvier':1,'février':2,'fevrier':2,'mars':3,'avril':4,'mai':5,'juin':6,
  'juillet':7,'août':8,'aout':8,'septembre':9,'octobre':10,'novembre':11,'décembre':12,'decembre':12
};
function csvDateToKey(str) {
  const parts = str.trim().toLowerCase().split(/\s+/);
  if (parts.length < 2) return null;
  const d = parseInt(parts[0]), m = CSV_MONTHS[parts[1]];
  if (!d || !m) return null;
  return state.currentYear + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}

// ── Travailleurs temporaires (leur nom dans une colonne = l'employé permanent est absent) ──
const CSV_TEMPS = new Set([
  'mallau','juliette','timéo','timeo','tim','gabriel','joanne','alex','oscar',
  'clémentin','clementine','fanny','tom','aline','bareth','joanne ad','oscar ad','alex ad',
  'ct','carolina','chantal','kevin','timée','agathe ad' // ne pas confondre avec status "AD"
]);

// ── Décode le contenu d'une cellule en statut ──
// defaultWork : 'va' pour Bulle, 'ad' pour Delorme
function csvCell(cell, defaultWork) {
  const raw = (cell || '').trim();
  if (!raw || raw === '-') return raw === '-' ? { s:'repos', n:'' } : null;

  // Normalise pour comparaisons (sans accents pour robustesse)
  const up = raw.toUpperCase().replace(/\n/g,' ').replace(/\s+/g,' ');

  if (up === 'OFF' || up.startsWith('OFF ')) return { s:'off', n:'' };
  if (/\bNPB\b/.test(up)) return { s:'repos', n:'NPB' };
  if (/\b(ECOLE|ÉCOLE|RÉVISION|REVISION|SOUTENANCE|EXAMEN|RECYCLAGE|SST|FORMATION)\b/.test(up)) return { s:'formation', n:'' };
  if (/\bCSA\b/.test(up)) return { s:'csa', n:'' };
  if (/\bAD\b/.test(up)) return { s:'ad', n:'' };
  if (/\bVA\b/.test(up) && defaultWork === 'ad') return { s:'va', n:'' };
  if (/\bJF\b/.test(up)) return { s:'jf', n:'' };
  if (/\bCP\b/.test(up)) return { s:'conges', n:'' };

  // Vérifie si c'est un travailleur temporaire (pas l'employé permanent)
  const firstWord = raw.split(/[\s\n,]/)[0].toLowerCase();
  if (CSV_TEMPS.has(firstWord)) return null;

  // Tout autre texte non vide = présent à la boutique par défaut
  return { s: defaultWork, n:'' };
}

// ── Parse les lignes de visites CSV (col D / col L) → objets booking ──
// Retourne { bookings: [...], noteText: '...' }
// Les lignes qui commencent par une heure (10h30, 14:30…) deviennent des bookings.
// Les lignes qui ne commencent pas par une heure mais contiennent > 2 mots deviennent noteText.
function parseCSVVisites(text, defaultActivity) {
  if (!text || !text.trim()) return { bookings: [], noteText: '' };
  const lines = text.replace(/\r/g,'').split(/\n+/).map(l=>l.trim()).filter(l=>l && l!=='-');
  const bookings=[], extras=[];
  for (const line of lines) {
    const tm = line.match(/^(\d{1,2})[Hh:](\d{2})/);
    if (!tm) {
      // Entrée sans heure : si plus de 2 mots, on la garde comme note
      if (line.split(/\s+/).length > 2) extras.push(line);
      continue;
    }
    const time = String(parseInt(tm[1])).padStart(2,'0') + 'h' + tm[2];
    const rest = line.slice(tm[0].length).replace(/^\s*[:\s]\s*/,'').trim();
    // Pax
    const paxM = rest.match(/(\d+)\s*(?:pax|pers(?:onnes?)?|adultes?|participants?)\b/i);
    const pax  = paxM ? parseInt(paxM[1]) : 0;
    // Canal de réservation
    let via = '';
    if      (/\bFH\b/.test(rest))                        via = 'FH';
    else if (/\bGYG\b/i.test(rest))                      via = 'GYG';
    else if (/\bWinalist\b/i.test(rest))                  via = 'Winalist';
    else if (/\btripadvisor\b/i.test(rest))               via = 'TripAdvisor';
    else if (/\bChallanges?\b/i.test(rest))               via = 'Challanges';
    else if (/\bOT\b/.test(rest))                         via = 'OT';
    else if (/\binvitation\b/i.test(rest))                via = 'invitation';
    else if (/\bRDV\b/i.test(rest))                       via = 'RDV';
    else if (/Vignoble[^)]{0,20}Découverte/i.test(rest))  via = 'V&D';
    else if (/Go\s*C[oô]t[eé]/i.test(rest))              via = 'Go Côté Saône';
    // Langue
    let langCode='', langFlag='';
    if      (/\bANG\b|\bEnglish\b/i.test(rest))              langFlag='🇬🇧';
    else if (/\bFRA\b|\bFrançais?\b|\bFrench\b/i.test(rest)) langFlag='🇫🇷';
    // Statut
    const status = /à\s*r[eé]gler/i.test(rest) ? 'a_regler' : 'confirmed';
    bookings.push({ time, pax, via, langCode, langFlag,
      activity: defaultActivity, description: rest.substring(0,400),
      status, comment:'', guide:'', guideLanguage:'', price:'' });
  }
  return { bookings, noteText: extras.join(' · ') };
}

// ── Import principal ──
function parseAndImportCSV(text, overwrite) {
  const rows = parseCSVSemi(text);
  let statCnt = 0, noteCnt = 0, bkCnt = 0, rowCnt = 0;

  // Colonnes employés Bulle (index CSV → nom dans l'app)
  const BULLE_EMPS = [
    { col:5, emp:'Loic',    dw:'va' },
    { col:6, emp:'Estelle', dw:'va' },
    { col:7, emp:'Alice',   dw:'va' },
    { col:8, emp:'Agathe',  dw:'va' },
  ];
  // Colonnes employés Delorme
  const DELORME_EMPS = [
    { col:12, emp:'Julie',   dw:'ad' },
    { col:14, emp:'Monique', dw:'ad' },
  ];

  const initDay = (b, k) => {
    if (!state.boutiques[b].schedule[k])    state.boutiques[b].schedule[k]    = {};
    if (!state.boutiques[b].statusNotes[k]) state.boutiques[b].statusNotes[k] = {};
  };

  const setS = (b, k, emp, s, note, overwrite) => {
    const cur = state.boutiques[b].schedule[k]?.[emp] || 'off';
    if (!overwrite && cur !== 'off') return false;
    state.boutiques[b].schedule[k][emp] = s;
    if (note) state.boutiques[b].statusNotes[k][emp] = note;
    else if (state.boutiques[b].statusNotes[k]) delete state.boutiques[b].statusNotes[k][emp];
    return true;
  };

  for (const row of rows) {
    if (row.length < 2) continue;
    const k = csvDateToKey(row[1]);
    if (!k) continue;
    rowCnt++;

    initDay('bulle', k);
    initDay('delorme', k);

    // ── Notes de la journée ──
    // Bulle : col 2 (RDV/rappels) → note ; col 3 (Visites) → bookings
    const rdv = (row[2]||'').trim();
    const { bookings: bulleBks, noteText: bulleExtra } = parseCSVVisites(row[3]||'', 'Visite/Dégustation');
    const bulleNote = [rdv.length > 2 ? rdv : '', bulleExtra].filter(Boolean).join('\n');
    if (bulleNote && (overwrite || !state.boutiques.bulle.notes[k])) {
      state.boutiques.bulle.notes[k] = bulleNote.substring(0, 800);
      noteCnt++;
    }
    if (bulleBks.length > 0 && (overwrite || !state.boutiques.bulle.bookings[k]?.length)) {
      if (!state.boutiques.bulle.bookings) state.boutiques.bulle.bookings = {};
      state.boutiques.bulle.bookings[k] = bulleBks;
      bkCnt += bulleBks.length;
    }

    // Delorme : col 11 (Visites AD) → bookings ; texte non-horaire → note
    const { bookings: delormeBks, noteText: delormeExtra } = parseCSVVisites(row[11]||'', '');
    if (delormeBks.length > 0 && (overwrite || !state.boutiques.delorme.bookings[k]?.length)) {
      if (!state.boutiques.delorme.bookings) state.boutiques.delorme.bookings = {};
      state.boutiques.delorme.bookings[k] = delormeBks;
      bkCnt += delormeBks.length;
    }
    if (delormeExtra && (overwrite || !state.boutiques.delorme.notes[k])) {
      state.boutiques.delorme.notes[k] = delormeExtra.substring(0, 400);
      noteCnt++;
    }

    // ── Statuts Bulle ──
    for (const { col, emp, dw } of BULLE_EMPS) {
      const parsed = csvCell(row[col], dw);
      if (!parsed) continue;
      if (setS('bulle', k, emp, parsed.s, parsed.n, overwrite)) {
        statCnt++;
        // Sync croisé pour Agathe et Monique
        if (state.boutiques.delorme.employees.includes(emp)) {
          initDay('delorme', k);
          setS('delorme', k, emp, parsed.s, parsed.n, overwrite);
        }
      }
    }

    // ── Statuts Delorme ──
    for (const { col, emp, dw } of DELORME_EMPS) {
      if (col >= row.length) continue;
      const parsed = csvCell(row[col], dw);
      if (!parsed) continue;
      if (setS('delorme', k, emp, parsed.s, parsed.n, overwrite)) {
        statCnt++;
        // Sync croisé pour Monique
        if (emp === 'Monique' && state.boutiques.bulle.employees.includes(emp)) {
          initDay('bulle', k);
          setS('bulle', k, emp, parsed.s, parsed.n, overwrite);
        }
      }
    }
  }

  return { rows: rowCnt, statuses: statCnt, notes: noteCnt, bookings: bkCnt };
}

// ── Push : notif immédiate lors d'une nouvelle réservation aujourd'hui ────────
async function sendBookingPush(bk, boutique, dateKey) {
  if (PUSH_SECRET === 'VOTRE_PUSH_SECRET') return; // pas encore configuré
  const todayKey = toKey(new Date());
  if (dateKey !== todayKey) return; // seulement pour aujourd'hui

  const boutiqueName = boutique === 'bulle' ? '🫧 Bulle' : '🍾 André Delorme';
  const paxPart   = bk.pax   ? `${bk.pax} pax` : '';
  const timePart  = bk.time  ? `${bk.time}` : '';
  const clientPart = bk.clientName || bk.description || bk.activity || '';
  const parts = [timePart, paxPart, clientPart].filter(Boolean).join(' · ');

  const who = currentUser ? ` (ajouté par ${currentUser})` : '';

  try {
    await fetch('/.netlify/functions/send-push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Push-Secret': PUSH_SECRET },
      body: JSON.stringify({
        title:   `📋 Nouvelle réservation — ${boutiqueName}`,
        message: parts + who
      })
    });
  } catch(e) { console.warn('sendBookingPush failed:', e); }
}

// ── Push notifications ────────────────────────────────────────────────────────
function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const raw = atob((b64 + pad).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function subscribeToPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if (VAPID_PUBLIC_KEY === 'VOTRE_VAPID_PUBLIC_KEY') return; // clé pas encore configurée
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') return;
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    if (db && authUser) {
      await db.ref('piffaut-push-subscriptions/' + authUser.uid).set({
        subscription: sub.toJSON(),
        email:       authUser.email,
        name:        authUser.displayName || '',
        updatedAt:   Date.now()
      });
    }
  } catch(e) { console.warn('Push subscription failed:', e); }
}

// ── Service Worker registration ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>

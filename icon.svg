<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0e5c5c"/>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e5c5c"/>
      <stop offset="100%" stop-color="#0a4040"/>
    </linearGradient>
  </defs>
  <!-- Stylized FP monogram -->
  <text x="256" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="280" font-weight="700"
        fill="#c4956a" text-anchor="middle" letter-spacing="-10">P</text>
  <!-- Thin gold line below -->
  <rect x="140" y="370" width="232" height="3" rx="2" fill="#c4956a" opacity="0.6"/>
  <!-- Small FP text -->
  <text x="256" y="430" font-family="Georgia, serif" font-size="52" font-weight="400"
        fill="#c4956a" text-anchor="middle" letter-spacing="14" opacity="0.85">FPVD</text>
</svg>
